<!DOCTYPE html>
<html lang="tr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Endüstriyel Barkod Konsolu</title>
    <script src="https://cdn.jsdelivr.net/npm/jsbarcode@3.11.5/dist/JsBarcode.all.min.js"></script>
    <style>
        :root {
            --bg-main: #f8fafc;
            --surface: #ffffff;
            --panel-bg: #f1f5f9;
            --primary: #2563eb;
            --primary-hover: #1d4ed8;
            --danger: #ef4444;
            --danger-hover: #dc2626;
            --text-main: #0f172a;
            --text-muted: #475569;
            --border: #cbd5e1;
            --radius-xl: 20px;
            --radius-lg: 12px;
            --radius-md: 8px;
        }

        @media (prefers-color-scheme: dark) {
            :root {
                --bg-main: #0f172a;
                --surface: #1e293b;
                --panel-bg: #1e293b;
                --text-main: #f8fafc;
                --text-muted: #94a3b8;
                --border: #334155;
            }
        }

        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
            -webkit-tap-highlight-color: transparent;
        }

        body {
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif;
            background-color: var(--bg-main);
            color: var(--text-main);
            min-height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            padding: 16px;
            line-height: 1.5;
        }

        .container {
            width: 100%;
            max-width: 1000px;
            background-color: var(--surface);
            border-radius: var(--radius-xl);
            box-shadow: 0 20px 25px -5px rgba(0, 0, 0, 0.1), 0 10px 10px -5px rgba(0, 0, 0, 0.04);
            display: grid;
            grid-template-columns: 1fr 1.2fr;
            overflow: hidden;
            border: 1px solid var(--border);
        }

        /* --- SOL PANEL --- */
        .panel-controls {
            padding: 32px;
            background-color: var(--panel-bg);
            border-right: 1px solid var(--border);
            display: flex;
            flex-direction: column;
            gap: 20px;
        }

        .panel-title { font-size: 1.4rem; font-weight: 700; letter-spacing: -0.02em; }

        .input-group { display: flex; flex-direction: column; gap: 6px; }
        .input-group label { font-size: 0.85rem; font-weight: 600; color: var(--text-muted); }

        textarea, input[type="number"] {
            width: 100%;
            padding: 12px;
            border: 1px solid var(--border);
            border-radius: var(--radius-md);
            background-color: var(--surface);
            color: var(--text-main);
            font-size: 0.95rem;
            transition: border-color 0.2s, box-shadow 0.2s;
        }

        textarea { height: 140px; resize: none; font-family: monospace; }
        textarea:focus, input:focus { outline: none; border-color: var(--primary); box-shadow: 0 0 0 3px rgba(37, 99, 235, 0.15); }

        .btn-row { display: flex; gap: 10px; margin-top: auto; }

        button {
            flex: 1;
            padding: 14px;
            border: none;
            border-radius: var(--radius-md);
            font-size: 0.95rem;
            font-weight: 600;
            cursor: pointer;
            transition: all 0.2s ease;
            color: white;
        }

        .btn-primary { background-color: var(--primary); }
        .btn-primary:hover:not(:disabled) { background-color: var(--primary-hover); }
        .btn-danger { background-color: var(--danger); }
        .btn-danger:hover:not(:disabled) { background-color: var(--danger-hover); }
        button:disabled { opacity: 0.4; cursor: not-allowed; }

        /* --- SAĞ PANEL (Barkod Alanı) --- */
        .panel-display {
            padding: 32px;
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            background-color: #ffffff; /* Lazer okuyucular için kalıcı beyaz zemin */
            position: relative;
            min-height: 380px;
        }

        /* Barkodu Kusursuz Ortalayan Yapı */
        .barcode-card {
            width: 100%;
            flex: 1;
            display: flex;
            justify-content: center; /* Yatay ortalama */
            align-items: center;     /* Dikey ortalama */
            position: relative;
            background-color: #ffffff;
            border: 1px solid #e2e8f0;
            border-radius: var(--radius-lg);
            padding: 16px;
            box-shadow: inset 0 2px 4px 0 rgba(0, 0, 0, 0.02);
            overflow: hidden;
        }

        /* Mobil Taşmaları Engelleyen SVG Ayarı */
        #barcodeSVG {
            max-width: 100%;
            height: auto !important;
            display: block;
            margin: 0 auto;
        }

        .progress-container {
            position: absolute;
            bottom: 0;
            left: 0;
            width: 100%;
            height: 5px;
            background-color: #f1f5f9;
        }

        .progress-bar {
            height: 100%;
            width: 0%;
            background-color: var(--primary);
            transition: width linear;
        }

        .status-badge {
            position: absolute;
            top: 16px;
            right: 16px;
            background-color: #e2e8f0;
            color: #475569;
            padding: 4px 10px;
            border-radius: 999px;
            font-size: 0.75rem;
            font-weight: 700;
        }

        .status-badge.active { background-color: #10b981; color: white; }

        .counter-text {
            margin-top: 16px;
            font-weight: 700;
            color: #1e293b;
            font-size: 1.1rem;
            text-align: center;
        }

        /* Mobil Uyum (Responsive) */
        @media (max-width: 768px) {
            .container { grid-template-columns: 1fr; }
            .panel-controls { border-right: none; border-bottom: 1px solid var(--border); padding: 20px; }
            .panel-display { padding: 20px; min-height: 320px; }
            .barcode-card { min-height: 200px; }
        }
    </style>
</head>
<body>

    <div class="container">
        <main class="panel-controls">
            <div>
                <h1 class="panel-title">Hızlı Barkod Taraması</h1>
                <p style="font-size: 0.8rem; color: var(--text-muted); margin-top: 2px;">El terminalleri ile %100 uyumlu</p>
            </div>

            <div class="input-group">
                <label for="barcodeInput">Barkod Veri Havuzu</label>
                <textarea id="barcodeInput" placeholder="8691234567890&#10;8690987654321" spellcheck="false"></textarea>
            </div>

            <div class="input-group">
                <label for="timeInput">Görüntülenme Periyodu (Saniye)</label>
                <input type="number" id="timeInput" value="3.0" min="0.3" step="0.1">
            </div>

            <div class="btn-row">
                <button class="btn-primary" id="startBtn" onclick="startDisplay()">Başlat</button>
                <button class="btn-danger" id="stopBtn" onclick="stopDisplay()" disabled>Durdur</button>
            </div>
        </main>

        <section class="panel-display">
            <div class="status-badge" id="statusBadge">HAZIR</div>
            
            <div class="barcode-card">
                <svg id="barcodeSVG"></svg>
                <div class="progress-container">
                    <div class="progress-bar" id="progressBar"></div>
                </div>
            </div>

            <div class="counter-text" id="statusText">İşlem başlatılması bekleniyor...</div>
        </section>
    </div>

    <script>
        let isRunning = false;
        let animationId;

        async function startDisplay() {
            const rawData = document.getElementById('barcodeInput').value;
            const barcodes = rawData.split(/[\n,\s]+/).map(c => c.trim()).filter(c => c !== "");
            const durationSec = parseFloat(document.getElementById('timeInput').value);

            if (!barcodes.length) return alert("Lütfen geçerli barkod girişleri yapın.");
            if (isNaN(durationSec) || durationSec < 0.2) return alert("Geçerli bir saniye aralığı girin.");

            const durationMs = durationSec * 1000;
            isRunning = true;
            toggleControls(true);

            const badge = document.getElementById('statusBadge');
            badge.textContent = "AKTİF";
            badge.classList.add('active');

            for (let i = 0; i < barcodes.length; i++) {
                if (!isRunning) break;
                document.getElementById('statusText').innerText = `Kayıt: ${i + 1} / ${barcodes.length}`;
                renderEngine(barcodes[i]);
                await runProgressBar(durationMs);
            }

            finishDisplay();
        }

        function renderEngine(code) {
            const svg = document.getElementById('barcodeSVG');
            try {
                // Kalınlık (width: 2) mobil ekranlarda taşmayı engeller
                const isEAN = (code.length === 13 && /^\d+$/.test(code));
                JsBarcode("#barcodeSVG", code, {
                    format: isEAN ? "EAN13" : "CODE128",
                    lineColor: "#0f172a",
                    background: "transparent",
                    width: 2, 
                    height: 110,
                    displayValue: true,
                    fontSize: 20,
                    fontOptions: "bold",
                    margin: 0 // Tam ortalama için margin her zaman sıfır olmalı
                });
            } catch (e) {
                svg.innerHTML = "";
                document.getElementById('statusText').innerText = `Hata: Format Uyumsuz [${code}]`;
            }
        }

        function runProgressBar(ms) {
            return new Promise(resolve => {
                const bar = document.getElementById('progressBar');
                const start = performance.now();

                function step(now) {
                    if (!isRunning) {
                        bar.style.width = '0%';
                        return resolve();
                    }
                    const elapsed = now - start;
                    const pct = Math.min((elapsed / ms) * 100, 100);
                    bar.style.width = `${pct}%`;

                    if (elapsed < ms) {
                        animationId = requestAnimationFrame(step);
                    } else {
                        bar.style.width = '0%';
                        resolve();
                    }
                }
                animationId = requestAnimationFrame(step);
            });
        }

        function stopDisplay() {
            isRunning = false;
            cancelAnimationFrame(animationId);
            document.getElementById('progressBar').style.width = '0%';
            
            const badge = document.getElementById('statusBadge');
            badge.textContent = "DURDURULDU";
            badge.classList.remove('active');
            document.getElementById('statusText').innerText = "Akış durduruldu.";
            toggleControls(false);
        }

        function finishDisplay() {
            if (!isRunning) return;
            isRunning = false;
            const badge = document.getElementById('statusBadge');
            badge.textContent = "TAMAMLANDI";
            badge.classList.remove('active');
            document.getElementById('statusText').innerText = "Tüm barkod serisi tamamlandı.";
            document.getElementById('barcodeSVG').innerHTML = "";
            toggleControls(false);
        }

        function toggleControls(state) {
            document.getElementById('startBtn').disabled = state;
            document.getElementById('stopBtn').disabled = !state;
            document.getElementById('barcodeInput').disabled = state;
            document.getElementById('timeInput').disabled = state;
        }
    </script>
</body>
</html>

<!DOCTYPE html>
<html lang="tr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Profesyonel Barkod Ekranı</title>
    <script src="https://cdn.jsdelivr.net/npm/jsbarcode@3.11.5/dist/JsBarcode.all.min.js"></script>
    <style>
        :root {
            --primary-color: #0f172a;
            --accent-color: #3b82f6;
            --success-color: #10b981;
            --bg-color: #f1f5f9;
            --card-bg: #ffffff;
            --text-color: #334155;
        }

        body {
            font-family: 'Segoe UI', system-ui, -apple-system, sans-serif;
            background-color: var(--bg-color);
            color: var(--text-color);
            margin: 0;
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
        }

        .dashboard {
            background-color: var(--card-bg);
            border-radius: 16px;
            box-shadow: 0 20px 25px -5px rgba(0, 0, 0, 0.1), 0 8px 10px -6px rgba(0, 0, 0, 0.1);
            width: 90%;
            max-width: 800px;
            display: grid;
            grid-template-columns: 1fr 1fr;
            overflow: hidden;
        }

        .controls-section {
            padding: 30px;
            background-color: #f8fafc;
            border-right: 1px solid #e2e8f0;
        }

        .display-section {
            padding: 30px;
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            background-color: #ffffff;
        }

        h2 {
            margin-top: 0;
            color: var(--primary-color);
            font-size: 1.5rem;
            margin-bottom: 20px;
        }

        label {
            display: block;
            font-weight: 600;
            margin-bottom: 8px;
            font-size: 0.9rem;
        }

        textarea {
            width: 100%;
            height: 120px;
            padding: 12px;
            border: 1px solid #cbd5e1;
            border-radius: 8px;
            resize: none;
            box-sizing: border-box;
            font-family: monospace;
            margin-bottom: 20px;
        }

        textarea:focus, input:focus {
            outline: none;
            border-color: var(--accent-color);
            box-shadow: 0 0 0 3px rgba(59, 130, 246, 0.1);
        }

        input[type="number"] {
            width: 100%;
            padding: 12px;
            border: 1px solid #cbd5e1;
            border-radius: 8px;
            box-sizing: border-box;
            margin-bottom: 24px;
        }

        .btn-group {
            display: flex;
            gap: 10px;
        }

        button {
            flex: 1;
            padding: 12px;
            border: none;
            border-radius: 8px;
            font-weight: 600;
            cursor: pointer;
            transition: all 0.2s ease;
            color: white;
        }

        .btn-start {
            background-color: var(--accent-color);
        }

        .btn-start:hover {
            background-color: #2563eb;
        }

        .btn-stop {
            background-color: #ef4444;
        }

        .btn-stop:hover {
            background-color: #dc2626;
        }

        .btn-start:disabled {
            background-color: #94a3b8;
            cursor: not-allowed;
        }

        #barcode-container {
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 200px;
            width: 100%;
        }

        .status-text {
            margin-top: 20px;
            font-weight: 600;
            color: #64748b;
            font-size: 1.1rem;
        }

        /* Mobil Uyumluluk */
        @media (max-width: 768px) {
            .dashboard {
                grid-template-columns: 1fr;
            }
            .controls-section {
                border-right: none;
                border-bottom: 1px solid #e2e8f0;
            }
        }
    </style>
</head>
<body>

    <div class="dashboard">
        <div class="controls-section">
            <h2>Gösterim Ayarları</h2>
            
            <label for="barcodeInput">Barkod Listesi (Alt alta veya virgülle girin)</label>
            <textarea id="barcodeInput" placeholder="8691234567890&#10;8690987654321"></textarea>

            <label for="timeInput">Ekranda Kalma Süresi (Saniye)</label>
            <input type="number" id="timeInput" value="3" min="0.5" step="0.5">

            <div class="btn-group">
                <button class="btn-start" id="startBtn" onclick="startDisplay()">Başlat</button>
                <button class="btn-stop" id="stopBtn" onclick="stopDisplay()" disabled>Durdur</button>
            </div>
        </div>

        <div class="display-section">
            <div id="barcode-container">
                <svg id="barcodeSVG"></svg>
            </div>
            <div class="status-text" id="statusText">Sistem Hazır</div>
        </div>
    </div>

    <script>
        let isRunning = false;
        let currentIndex = 0;

        async function startDisplay() {
            const inputVal = document.getElementById('barcodeInput').value;
            // Girdiyi hem virgüle hem de yeni satıra göre ayır, boşlukları temizle
            let barcodes = inputVal.split(/[\n,]+/).map(code => code.trim()).filter(code => code !== "");
            
            const durationSec = parseFloat(document.getElementById('timeInput').value);
            
            if (barcodes.length === 0) {
                alert("Lütfen en az bir adet barkod giriniz.");
                return;
            }
            if (isNaN(durationSec) || durationSec <= 0) {
                alert("Lütfen geçerli bir saniye giriniz.");
                return;
            }

            const durationMs = durationSec * 1000;
            const statusText = document.getElementById('statusText');
            
            // Arayüz butonlarını ayarla
            isRunning = true;
            document.getElementById('startBtn').disabled = true;
            document.getElementById('stopBtn').disabled = false;
            document.getElementById('barcodeInput').disabled = true;
            document.getElementById('timeInput').disabled = true;

            for (let i = 0; i < barcodes.length; i++) {
                if (!isRunning) break; // Döngüyü dışarıdan durdurabilmek için kontrol
                
                currentIndex = i + 1;
                statusText.innerText = `Gösteriliyor: ${currentIndex} / ${barcodes.length}`;
                
                // Barkodu Çizdir
                try {
                    // Kullanıcı EAN istiyor ancak girilen değer tam 13 hane değilse sistem çökmesin diye CODE128 yedeklemesi
                    let formatType = (barcodes[i].length === 13) ? "EAN13" : "CODE128";
                    
                    JsBarcode("#barcodeSVG", barcodes[i], {
                        format: formatType,
                        lineColor: "#0f172a",
                        width: 3,
                        height: 100,
                        displayValue: true,
                        fontSize: 20,
                        margin: 10
                    });
                } catch (error) {
                    // Eğer barkod formatı hatalıysa ekranda hata metni göster
                    document.getElementById('barcodeSVG').innerHTML = "";
                    statusText.innerText = `Hatalı Barkod: ${barcodes[i]}`;
                }

                // Bekleme süresi
                await new Promise(resolve => setTimeout(resolve, durationMs));
            }
            
            // İşlem bitince sistemi sıfırla
            if (isRunning) {
                statusText.innerText = "Tüm Barkodlar Gösterildi";
                document.getElementById('barcodeSVG').innerHTML = ""; // Ekranı temizle
            }
            
            resetControls();
        }

        function stopDisplay() {
            isRunning = false;
            document.getElementById('statusText').innerText = "Gösterim Durduruldu";
            resetControls();
        }

        function resetControls() {
            document.getElementById('startBtn').disabled = false;
            document.getElementById('stopBtn').disabled = true;
            document.getElementById('barcodeInput').disabled = false;
            document.getElementById('timeInput').disabled = false;
        }
    </script>
</body>
</html>

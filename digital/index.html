<!DOCTYPE html>
<html lang="tr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0">
<title>FLO #4254 Envanter</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=DM+Sans:ital,opsz,wght@0,9..40,300;0,9..40,400;0,9..40,500;0,9..40,600;0,9..40,700&family=DM+Mono:wght@400;500&display=swap" rel="stylesheet">
<style>
/* ── TOKENS ─────────────────────────────────────────────────── */
:root {
  --red:      #D0011B;
  --red-light:#FDECEA;
  --ink:      #0D0D0D;
  --ink-2:    #3A3A3A;
  --ink-3:    #767676;
  --ink-4:    #B0B0B0;
  --surface:  #F4F4F4;
  --card:     #FFFFFF;
  --border:   #E6E6E6;
  --border-2: #CCCCCC;
  --green:    #00875A;
  --green-bg: #E3F5EF;
  --amber:    #B45309;
  --amber-bg: #FEF3C7;
  --blue:     #1A56DB;
  --blue-bg:  #EBF5FF;
  --shadow-s: 0 1px 3px rgba(0,0,0,.07), 0 1px 2px rgba(0,0,0,.04);
  --r:        14px;
  --r-s:      9px;
}

/* ── RESET ──────────────────────────────────────────────────── */
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
html{-webkit-tap-highlight-color:transparent;scroll-behavior:smooth}
body{
font-family:'DM Sans',system-ui,sans-serif;
background:var(--surface);
color:var(--ink);
min-height:100vh;
font-size:14px;
line-height:1.5;
-webkit-font-smoothing:antialiased;
}
input,select,button{font-family:inherit}
button{cursor:pointer;border:none;background:none}
input[type=number]{-moz-appearance:textfield}
input[type=number]::-webkit-inner-spin-button,
input[type=number]::-webkit-outer-spin-button{-webkit-appearance:none}

/* ══ TOP BAR ════════════════════════════════════════════════════ */
.topbar{
position:sticky;top:0;z-index:200;
background:#fff;
border-bottom:3px solid var(--red);
padding:0 16px;
display:flex;align-items:center;gap:12px;
height:54px;
box-shadow:0 2px 10px rgba(0,0,0,.07);
}
.logo{
background:var(--red);color:#fff;
font-size:12px;font-weight:700;letter-spacing:2.5px;
padding:5px 9px;border-radius:5px;flex-shrink:0;
}
.topbar-info{flex:1;min-width:0}
.topbar-info h1{
font-size:13px;font-weight:600;color:var(--ink);
white-space:nowrap;overflow:hidden;text-overflow:ellipsis;
}
.topbar-info p{font-size:11px;color:var(--ink-3)}
.hdr-btns{display:flex;gap:6px;flex-shrink:0}
.hdr-btn{
height:34px;padding:0 12px;
border-radius:7px;font-size:12px;font-weight:600;
display:flex;align-items:center;gap:5px;
border:1.5px solid var(--border-2);
color:var(--ink-2);background:#fff;
transition:background .12s;
}
.hdr-btn:active{background:var(--surface)}
.hdr-btn.primary{background:var(--green);border-color:var(--green);color:#fff}

/* ══ KPI BAR ════════════════════════════════════════════════════ */
.kpi-bar{
background:#fff;
border-bottom:1px solid var(--border);
display:grid;grid-template-columns:repeat(4,1fr);
divide:solid 1px var(--border);
}
.kpi{
padding:12px 8px 10px;text-align:center;
border-right:1px solid var(--border);
}
.kpi:last-child{border-right:none}
.kpi-num{font-size:22px;font-weight:700;line-height:1;letter-spacing:-.5px}
.kpi-lbl{font-size:9.5px;font-weight:600;color:var(--ink-4);text-transform:uppercase;letter-spacing:.5px;margin-top:3px}
.kpi.red   .kpi-num{color:var(--red)}
.kpi.green .kpi-num{color:var(--green)}
.kpi.amber .kpi-num{color:var(--amber)}
.kpi.blue  .kpi-num{color:var(--blue)}

/* ══ PROGRESS ═══════════════════════════════════════════════════ */
.prog-section{
background:#fff;border-bottom:1px solid var(--border);
padding:10px 16px 12px;
}
.prog-meta{display:flex;justify-content:space-between;align-items:center;margin-bottom:7px}
.prog-meta span{font-size:11px;color:var(--ink-3);font-weight:500}
.prog-meta strong{font-size:11px;font-weight:700;color:var(--green)}
.prog-track{height:5px;background:var(--border);border-radius:99px;overflow:hidden}
.prog-bar{height:100%;background:linear-gradient(90deg,#00875A,#34D399);border-radius:99px;transition:width .55s cubic-bezier(.4,0,.2,1)}

/* ══ FILTER AREA ════════════════════════════════════════════════ */
.filter-section{
background:#fff;border-bottom:1px solid var(--border);
position:sticky;top:54px;z-index:100;
}
.chip-row{
display:flex;align-items:center;gap:6px;
overflow-x:auto;padding:10px 16px;
scrollbar-width:none;
}
.chip-row::-webkit-scrollbar{display:none}
.chip-row + .chip-row{padding-top:0;padding-bottom:10px}
.grp-label{
font-size:10px;font-weight:700;color:var(--ink-4);
text-transform:uppercase;letter-spacing:.6px;
flex-shrink:0;white-space:nowrap;margin-right:2px;
}
.chip{
padding:6px 13px;border-radius:99px;
border:1.5px solid var(--border-2);
font-size:12px;font-weight:500;color:var(--ink-2);
background:#fff;white-space:nowrap;flex-shrink:0;
transition:all .14s;
-webkit-tap-highlight-color:transparent;
}
.chip.on{background:var(--red);border-color:var(--red);color:#fff;font-weight:600}
.chip:active{transform:scale(.94)}

.search-row{padding:0 16px 10px}
.search-box{
display:flex;align-items:center;gap:8px;
background:var(--surface);
border:1.5px solid var(--border);
border-radius:var(--r-s);padding:9px 12px;
transition:border-color .2s;
}
.search-box:focus-within{border-color:var(--red);background:#fff}
.search-ic{font-size:14px;color:var(--ink-4);flex-shrink:0}
.search-box input{
flex:1;border:none;background:transparent;
font-size:13px;color:var(--ink);outline:none;
}
.search-box input::placeholder{color:var(--ink-4)}
.search-clear{color:var(--ink-4);font-size:14px;padding:2px;display:none}

/* ══ LIST HEADER ════════════════════════════════════════════════ */
.list-hd{
display:flex;justify-content:space-between;align-items:center;
padding:14px 16px 8px;
}
.list-hd-title{font-size:11px;font-weight:700;color:var(--ink-3);text-transform:uppercase;letter-spacing:.5px}
.list-hd-count{font-size:11px;color:var(--ink-4);background:var(--surface);padding:2px 8px;border-radius:99px;border:1px solid var(--border)}

/* ══ CARDS ══════════════════════════════════════════════════════ */
.card-list{display:flex;flex-direction:column;gap:8px;padding:0 12px 80px}

.card{
background:#fff;border-radius:var(--r);
border:1.5px solid var(--border);
box-shadow:var(--shadow-s);
overflow:hidden;
position:relative;
transition:border-color .18s;
}
/* Status stripe */
.card::after{
content:'';position:absolute;left:0;top:0;bottom:0;
width:4px;background:transparent;
transition:background .2s;
border-radius:2px 0 0 2px;
}
.card.s-ok   { border-color:rgba(0,135,90,.2); }
.card.s-ok::after   { background:var(--green); }
.card.s-diff { border-color:rgba(180,83,9,.2); }
.card.s-diff::after { background:var(--amber); }
.card.s-done { opacity:.55; }
.card.s-done::after { background:#aaa; }

.card-body{padding:13px 13px 13px 17px}

/* Top row */
.card-head{display:flex;gap:10px;align-items:flex-start;margin-bottom:9px}
.c-check{
flex-shrink:0;width:20px;height:20px;
accent-color:var(--green);cursor:pointer;margin-top:2px;
}
.c-info{flex:1;min-width:0}
.c-name{font-size:13px;font-weight:600;color:var(--ink);line-height:1.35;margin-bottom:4px}
.c-code{
font-family:'DM Mono',monospace;font-size:10.5px;
color:var(--ink-3);background:var(--surface);
padding:1px 6px;border-radius:4px;display:inline-block;
border:1px solid var(--border);
}

/* Tags */
.c-tags{display:flex;flex-wrap:wrap;gap:4px;margin-bottom:11px}
.tag{
font-size:10px;font-weight:600;padding:2px 7px;border-radius:5px;
letter-spacing:.1px;border-width:1px;border-style:solid;
}
.t-aks  {background:#FFF7ED;color:#9A3412;border-color:#FED7AA}
.t-dep  {background:#FFF1F2;color:#BE123C;border-color:#FECDD3}
.t-ask  {background:#F0FDF4;color:#15803D;border-color:#BBF7D0}
.t-rey  {background:#EFF6FF;color:#1D4ED8;border-color:#BFDBFE}
.t-asp  {background:#FAF5FF;color:#6D28D9;border-color:#DDD6FE}
.t-kadn {background:#FDF2F8;color:#9D174D;border-color:#FBCFE8}
.t-erkk {background:#EFF6FF;color:#1E3A8A;border-color:#BFDBFE}
.t-cock {background:#FEFCE8;color:#854D0E;border-color:#FDE68A}
.t-spor {background:#F0FDF4;color:#166534;border-color:#BBF7D0}
.t-akss {background:#F9FAFB;color:#374151;border-color:#D1D5DB}
.t-stok {background:#F9FAFB;color:var(--ink-3);border-color:var(--border)}

/* Qty row */
.qty-row{
display:grid;
grid-template-columns:56px 1fr 56px;
gap:8px;align-items:center;
padding-top:10px;
border-top:1px solid var(--border);
}

.sys-box{
display:flex;flex-direction:column;align-items:center;
background:var(--blue-bg);border-radius:var(--r-s);
padding:7px 4px;border:1px solid #BFDBFE;
}
.sys-num{font-size:20px;font-weight:700;color:var(--blue);line-height:1}
.sys-lbl{font-size:8.5px;font-weight:700;color:var(--blue);text-transform:uppercase;letter-spacing:.4px;margin-top:2px}

.stepper{
display:flex;align-items:center;
border:1.5px solid var(--border-2);border-radius:var(--r-s);
overflow:hidden;background:#fff;
}
.step-btn{
flex-shrink:0;width:40px;height:48px;
display:flex;align-items:center;justify-content:center;
font-size:22px;font-weight:300;color:var(--ink-2);
background:#fff;transition:background .1s;
-webkit-tap-highlight-color:transparent;
}
.step-btn:active{background:var(--surface)}
.step-inp{
flex:1;height:48px;border:none;
border-left:1.5px solid var(--border);
border-right:1.5px solid var(--border);
text-align:center;
font-family:'DM Sans',sans-serif;
font-size:20px;font-weight:700;color:var(--ink);
background:#fff;outline:none;
min-width:0;
}
.step-inp.ok  {border-color:var(--green);color:var(--green)}
.step-inp.bad {border-color:var(--amber);color:var(--amber)}

.fark-box{
display:flex;flex-direction:column;align-items:center;
border-radius:var(--r-s);padding:7px 4px;
background:var(--surface);border:1px solid var(--border);
}
.fark-box.f-ok  {background:var(--green-bg);border-color:#A7F3D0}
.fark-box.f-neg {background:var(--amber-bg);border-color:#FDE68A}
.fark-box.f-pos {background:var(--blue-bg);border-color:#BFDBFE}
.fark-num{font-size:18px;font-weight:700;line-height:1}
.fark-ok  .fark-num, .f-ok  .fark-num{color:var(--green)}
.fark-neg .fark-num, .f-neg .fark-num{color:var(--amber)}
.f-pos .fark-num{color:var(--blue)}
.fark-lbl{font-size:8.5px;font-weight:700;text-transform:uppercase;letter-spacing:.4px;margin-top:2px;color:var(--ink-3)}
.f-ok  .fark-lbl{color:var(--green)}
.f-neg .fark-lbl{color:var(--amber)}
.f-pos .fark-lbl{color:var(--blue)}

/* Note */
.note-row{margin-top:9px}
.note-inp{
width:100%;border:1.5px solid var(--border);border-radius:var(--r-s);
padding:8px 11px;font-size:12px;color:var(--ink);
background:var(--surface);outline:none;
transition:border-color .2s, background .2s;
}
.note-inp:focus{border-color:var(--red);background:#fff}
.note-inp::placeholder{color:var(--ink-4)}

/* ══ EMPTY ══════════════════════════════════════════════════════ */
.empty{text-align:center;padding:56px 24px;color:var(--ink-4)}
.empty-ic{font-size:36px;margin-bottom:10px}
.empty p{font-size:13px}

/* ══ BOTTOM BAR ═════════════════════════════════════════════════ */
.bottom-bar{
position:fixed;bottom:0;left:0;right:0;z-index:150;
background:rgba(255,255,255,.96);
backdrop-filter:blur(10px);
border-top:1px solid var(--border);
padding:10px 14px max(10px,env(safe-area-inset-bottom));
display:flex;gap:8px;
}
.bot-btn{
flex:1;height:46px;border-radius:10px;
font-size:13px;font-weight:600;
display:flex;align-items:center;justify-content:center;gap:6px;
transition:opacity .12s,transform .1s;
}
.bot-btn:active{opacity:.8;transform:scale(.97)}
.btn-save{background:var(--green);color:#fff}
.btn-csv {background:var(--blue-bg);color:var(--blue);border:1.5px solid #BFDBFE}
.btn-rst {background:var(--surface);color:var(--ink-3);border:1.5px solid var(--border);flex:0 0 auto;padding:0 16px}

/* ══ TOAST ══════════════════════════════════════════════════════ */
.toast{
position:fixed;bottom:80px;left:50%;
transform:translateX(-50%) translateY(6px);
background:rgba(13,13,13,.92);color:#fff;
padding:10px 22px;border-radius:99px;
font-size:13px;font-weight:500;white-space:nowrap;
box-shadow:0 4px 16px rgba(0,0,0,.18);
opacity:0;transition:all .22s;z-index:999;pointer-events:none;
}
.toast.show{opacity:1;transform:translateX(-50%) translateY(0)}

/* ══ DESKTOP ════════════════════════════════════════════════════ */
@media(min-width:600px){
.card-list,.list-hd,.bottom-bar .inner{max-width:580px;margin-left:auto;margin-right:auto}
.bottom-bar{justify-content:center}
.bottom-bar{padding-left:calc(50% - 280px);padding-right:calc(50% - 280px)}
}
</style>

</head>

  <div class="search-row">

      <span class="search-ic">🔍</span>
      <input id="searchInp" type="search" placeholder="Ünite adı veya kodu ara…" autocomplete="off" autocorrect="off">
      <button class="search-clear" id="clearBtn" onclick="clearSearch()">✕</button>
    </div>
  </div>
</div>

<div class="list-hd">
  <span class="list-hd-title">Ünite Listesi</span>
  <span class="list-hd-count" id="listCount">52 kayıt</span>
</div>

<div class="card-list" id="cardList"></div>
<div class="empty" id="emptyState" style="display:none">
  <div class="empty-ic">🔍</div>
  <p>Bu filtreye uygun ünite bulunamadı</p>
</div>

<div class="toast" id="toastEl"></div>

<div class="bottom-bar">
  <button class="bot-btn btn-rst" onclick="resetAll()">✕</button>
  <button class="bot-btn btn-csv" onclick="exportCSV()">⬇ CSV</button>
  <button class="bot-btn btn-save" onclick="saveLocal()">💾 Kaydet</button>
</div>

/* ── STATE ────────────────────────────────────────────────── */
let state={};
let F={lok:'',sat:'',dur:'',q:''};
function load(){try{const s=localStorage.getItem('flo4254v3');if(s)state=JSON.parse(s);}catch(e){}}
function saveLocal(){try{localStorage.setItem('flo4254v3',JSON.stringify(state));toast('💾 Kaydedildi');}catch(e){toast('⚠️ Hata');}}

/* ── TAG MAPS ─────────────────────────────────────────────── */
const LOK_CLS={'AKSESUAR':'t-aks','SEZON DEPO':'t-dep','SEZON ASKILI AYAKKAB':'t-ask','SEZON REYON':'t-rey','AKSESUAR-AKTIF SPOR':'t-asp'};
const LOK_LBL={'AKSESUAR':'Aksesuar','SEZON DEPO':'Depo','SEZON ASKILI AYAKKAB':'Askılı','SEZON REYON':'Reyon','AKSESUAR-AKTIF SPOR':'Aks+Spor'};
const SAT_CLS={'Kadın':'t-kadn','Erkek':'t-erkk','Çocuk':'t-cock','Aktif Spor':'t-spor','Aksesuar':'t-akss'};

/* ── FILTER ───────────────────────────────────────────────── */
function ok(row){
  const s=state[row.id]||{};
  const has=s.sayim!==undefined&&s.sayim!=='';
  const fark=has?(Number(s.sayim)-row.adet):null;
  if(F.lok&&row.lok!==F.lok)return false;
  if(F.sat&&row.sat!==F.sat)return false;
  if(F.q&&!row.ad.toLowerCase().includes(F.q)&&!String(row.kod).includes(F.q))return false;
  if(F.dur){
    if(F.dur==='wait'&&has)return false;
    if(F.dur==='ok'&&!(has&&fark===0))return false;
    if(F.dur==='diff'&&!(has&&fark!==0))return false;
    if(F.dur==='done'&&!s.done)return false;
  }
  return true;
}

/* ── RENDER ───────────────────────────────────────────────── */
function render(){
  const list=document.getElementById('cardList');
  const empty=document.getElementById('emptyState');
  list.innerHTML='';
  let vis=0,doneCnt=0,diffCnt=0,sysTot=0;

  DATA.forEach(row=>{
    if(!ok(row))return;
    vis++;sysTot+=row.adet;
    const s=state[row.id]||{};
    const has=s.sayim!==undefined&&s.sayim!=='';
    const sv=has?Number(s.sayim):null;
    const fark=has?(sv-row.adet):null;
    const isDone=!!s.done;
    if(isDone)doneCnt++;
    if(has&&fark!==0)diffCnt++;

    // card state class
    let sc='';
    if(isDone)sc='s-done';
    else if(has&&fark===0)sc='s-ok';
    else if(has&&fark!==0)sc='s-diff';

    // fark box
    let farkHtml='';
    if(fark===null){
      farkHtml=`<div class="fark-box"><span class="fark-num" style="color:var(--ink-4);font-size:14px">—</span><span class="fark-lbl">Fark</span></div>`;
    }else if(fark===0){
      farkHtml=`<div class="fark-box f-ok"><span class="fark-num">±0</span><span class="fark-lbl">Eşit</span></div>`;
    }else if(fark<0){
      farkHtml=`<div class="fark-box f-neg"><span class="fark-num">${fark}</span><span class="fark-lbl">Eksik</span></div>`;
    }else{
      farkHtml=`<div class="fark-box f-pos"><span class="fark-num">+${fark}</span><span class="fark-lbl">Fazla</span></div>`;
    }

    let inpCls='step-inp';
    if(has)inpCls+=fark===0?' ok':' bad';

    const div=document.createElement('div');
    div.className=`card ${sc}`;
    div.dataset.id=row.id;
    div.innerHTML=`
      <div class="card-body">
        <div class="card-head">
          <input type="checkbox" class="c-check" ${isDone?'checked':''} onchange="toggleDone(${row.id},this.checked)">
          <div class="c-info">
            <div class="c-name">${row.ad}</div>
            <span class="c-code">${row.kod}</span>
          </div>
        </div>
        <div class="c-tags">
          <span class="tag ${LOK_CLS[row.lok]||'t-stok'}">${LOK_LBL[row.lok]||row.lok}</span>
          <span class="tag ${SAT_CLS[row.sat]||'t-akss'}">${row.sat}</span>
          ${row.stok?`<span class="tag t-stok">${row.stok}</span>`:''}
        </div>
        <div class="qty-row">
          <div class="sys-box">
            <span class="sys-num">${row.adet}</span>
            <span class="sys-lbl">Sistem</span>
          </div>
          <div class="stepper">
            <button class="step-btn" ontouchstart="" onclick="adj(${row.id},-1)">−</button>
            <input type="number" class="${inpCls}" min="0" value="${has?s.sayim:''}" placeholder="—"
              onchange="setSayim(${row.id},this.value)"
              oninput="setSayim(${row.id},this.value)">
            <button class="step-btn" ontouchstart="" onclick="adj(${row.id},+1)">+</button>
          </div>
          ${farkHtml}
        </div>
        <div class="note-row">
          <input class="note-inp" placeholder="Not… (opsiyonel)"
            value="${(s.not||'')}"
            onchange="setNot(${row.id},this.value)">
        </div>
      </div>`;
    list.appendChild(div);
  });

  empty.style.display=vis===0?'block':'none';
  document.getElementById('kVis').textContent=vis;
  document.getElementById('kDone').textContent=doneCnt;
  document.getElementById('kDiff').textContent=diffCnt;
  document.getElementById('kSys').textContent=sysTot;
  document.getElementById('listCount').textContent=vis+' kayıt';

  const totalDone=DATA.filter(r=>(state[r.id]||{}).done).length;
  const pct=Math.round(totalDone/DATA.length*100);
  document.getElementById('progBar').style.width=pct+'%';
  document.getElementById('progTxt').textContent='%'+pct+' tamamlandı ('+totalDone+'/52)';
}

/* ── MUTATIONS ───────────────────────────────────────────── */
function setSayim(id,v){
  if(!state[id])state[id]={};
  state[id].sayim=v;
  debRender();
}
function setNot(id,v){
  if(!state[id])state[id]={};
  state[id].not=v;
}
function toggleDone(id,c){
  if(!state[id])state[id]={};
  state[id].done=c;
  render();
}
function adj(id,d){
  const s=state[id]||{};
  const cur=s.sayim!==undefined&&s.sayim!==''?Number(s.sayim):0;
  const next=Math.max(0,cur+d);
  if(!state[id])state[id]={};
  state[id].sayim=String(next);
  const card=document.querySelector(`[data-id="${id}"]`);
  if(card){
    const inp=card.querySelector('.step-inp');
    if(inp)inp.value=next;
  }
  debRender();
}

/* ── CHIPS ───────────────────────────────────────────────── */
function bindChips(gid,key){
  document.getElementById(gid).querySelectorAll('.chip').forEach(b=>{
    b.addEventListener('click',()=>{
      document.getElementById(gid).querySelectorAll('.chip').forEach(x=>x.classList.remove('on'));
      b.classList.add('on');
      F[key]=b.dataset.val;
      render();
    });
  });
}
bindChips('grp-lok','lok');
bindChips('grp-sat','sat');
bindChips('grp-dur','dur');

const si=document.getElementById('searchInp');
const cb=document.getElementById('clearBtn');
si.addEventListener('input',()=>{
  F.q=si.value.toLowerCase().trim();
  cb.style.display=F.q?'inline':'none';
  debRender();
});
function clearSearch(){si.value='';F.q='';cb.style.display='none';render();}

/* ── RESET ───────────────────────────────────────────────── */
function resetAll(){
  F={lok:'',sat:'',dur:'',q:''};
  si.value='';cb.style.display='none';
  ['grp-lok','grp-sat','grp-dur'].forEach(gid=>{
    document.getElementById(gid).querySelectorAll('.chip').forEach((b,i)=>b.classList.toggle('on',i===0));
  });
  render();
}

/* ── CSV ─────────────────────────────────────────────────── */
function exportCSV(){
  const hdr=['#','Lokasyon','Satınalma','Stok Grubu','Ünite Kodu','Ünite Adı','Sistem Adet','Sayım Adeti','Fark','Durum','Not'];
  const rows=DATA.map((r,i)=>{
    const s=state[r.id]||{};
    const has=s.sayim!==undefined&&s.sayim!=='';
    const sv=has?Number(s.sayim):'';
    const fark=has?(sv-r.adet):'';
    let dur='Bekliyor';
    if(s.done)dur='Onaylandı';
    else if(has&&fark===0)dur='Eşleşti';
    else if(has)dur='Fark Var';
    return[i+1,r.lok,r.sat,r.stok,r.kod,`"${r.ad}"`,r.adet,sv,fark,dur,s.not||''];
  });
  const csv=[hdr,...rows].map(r=>r.join(';')).join('\n');
  const a=document.createElement('a');
  a.href=URL.createObjectURL(new Blob(['\uFEFF'+csv],{type:'text/csv;charset=utf-8'}));
  a.download='FLO_4254_'+new Date().toLocaleDateString('tr').replaceAll('.','-')+'.csv';
  a.click();
  toast('⬇ CSV indirildi');
}

/* ── TOAST ───────────────────────────────────────────────── */
function toast(msg){
  const el=document.getElementById('toastEl');
  el.textContent=msg;el.classList.add('show');
  clearTimeout(toast._t);
  toast._t=setTimeout(()=>el.classList.remove('show'),2000);
}

/* ── DEBOUNCE ────────────────────────────────────────────── */
let _rt;function debRender(){clearTimeout(_rt);_rt=setTimeout(render,100);}

/* ── INIT ────────────────────────────────────────────────── */
load();render();
</script>

<!DOCTYPE html>

<html lang="tr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0">
<title>FLO Operasyonel Denetim Sistemi | ardaulas.online</title>
<link href="https://fonts.googleapis.com/css2?family=Syne:wght@400;600;700;800&family=DM+Sans:wght@300;400;500;600&display=swap" rel="stylesheet">
<script src="https://www.gstatic.com/firebasejs/9.22.2/firebase-app-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/9.22.2/firebase-firestore-compat.js"></script>

<style>
  :root {
    --primary: #FF3B30; --primary-dark: #C0271E; --bg: #0D0D0F; --surface: #17171A;
    --surface2: #1E1E23; --border: rgba(255,255,255,0.07); --text: #F0F0F0; --muted: #888;
    --green: #30D158; --red: #FF3B30; --amber: #FF9F0A; --blue: #0A84FF; --gray: #3A3A3F;
  }
  * { margin:0; padding:0; box-sizing:border-box; }
  body { font-family:'DM Sans',sans-serif; background:var(--bg); color:var(--text); min-height:100vh; display:flex; flex-direction:column; }

  /* ===== TOP BAR ===== */
  .top-bar {
    position: sticky; top:0; z-index:100;
    background: rgba(13,13,15,0.95); backdrop-filter: blur(20px);
    border-bottom: 1px solid var(--border);
    padding: 0 16px; display: flex; align-items: center;
    justify-content: space-between; height: 56px; gap: 8px;
  }
  .brand { display:flex; align-items:center; gap:10px; min-width:0; }
  .brand-logo { width:32px; height:32px; flex-shrink:0; background:var(--primary); border-radius:8px; display:flex; align-items:center; justify-content:center; font-family:'Syne',sans-serif; font-weight:800; font-size:15px; color:#fff; }
  .brand-text { min-width:0; }
  .brand-name { font-family:'Syne',sans-serif; font-weight:700; font-size:15px; letter-spacing:-0.3px; white-space:nowrap; overflow:hidden; text-overflow:ellipsis; }
  .brand-sub { font-size:11px; color:var(--muted); margin-top:-1px; }
  .audit-code-badge { background: linear-gradient(135deg, var(--primary), #FF6B6B); padding: 5px 12px; border-radius:20px; font-family:'Syne',sans-serif; font-weight:700; font-size:11px; letter-spacing:.5px; box-shadow: 0 4px 20px rgba(255,59,48,0.35); white-space:nowrap; display:none; }
  .header-actions { display:flex; gap:8px; align-items:center; flex-shrink:0; }
  .admin-btn { background:var(--surface2); border:1px solid var(--border); color:var(--text); padding:6px 10px; border-radius:8px; font-size:11px; font-weight:600; cursor:pointer; transition:all 0.2s; white-space:nowrap; }
  .admin-btn:hover { background:var(--blue); border-color:var(--blue); color:#fff; }
  .score-pill { background: var(--surface2); border:1px solid var(--border); border-radius:10px; padding:5px 12px; text-align:center; }
  .score-pill .val { font-family:'Syne',sans-serif; font-size:17px; font-weight:800; background: linear-gradient(135deg, #fff, var(--amber)); -webkit-background-clip:text; -webkit-text-fill-color:transparent; line-height:1; }
  .score-pill .lbl { font-size:9px; color:var(--muted); text-transform:uppercase; letter-spacing:1px; margin-top:1px; }

  /* ===== PROGRESS BAR ===== */
  .progress-container { padding: 8px 16px; background:var(--surface); border-bottom: 1px solid var(--border); display:flex; align-items:center; gap:10px; flex-wrap:wrap; }
  .progress-bar-wrap { flex:1; min-width:80px; height:4px; background:var(--surface2); border-radius:2px; overflow:hidden; }
  .progress-bar-fill { height:100%; border-radius:2px; transition:width 0.5s ease; background: linear-gradient(90deg, var(--primary), var(--amber)); }
  .progress-stats { display:flex; gap:12px; font-size:11px; color:var(--muted); flex-wrap:wrap; }
  .progress-stats span { display:flex; align-items:center; gap:5px; }
  .dot { width:7px; height:7px; border-radius:50%; display:inline-block; flex-shrink:0; }

  /* ===== MAIN CONTENT ===== */
  .container { max-width:900px; margin:0 auto; padding:20px 12px; flex:1; width:100%; }

  /* ===== AUDIT CARD ===== */
  .audit-card { background: var(--surface); border: 1px solid var(--border); border-radius:14px; margin-bottom:12px; overflow:hidden; animation: fadeIn 0.3s ease; }
  .card-header { padding:16px; display:grid; grid-template-columns: auto 1fr auto; gap:12px; align-items:start; background: rgba(255,255,255,0.02); border-bottom:1px solid var(--border); }
  .card-num { width:40px; height:40px; flex-shrink:0; border-radius:10px; background:var(--surface2); border:1px solid var(--border); display:flex; align-items:center; justify-content:center; font-family:'Syne',sans-serif; font-weight:800; font-size:14px; color:var(--muted); }
  .card-meta { display:flex; flex-direction:column; justify-content:center; min-width:0; }
  .card-code { font-size:11px; color:var(--primary); font-weight:700; letter-spacing:.8px; margin-bottom:4px; }
  .card-title { font-size:15px; font-weight:600; line-height:1.4; color:var(--text); }
  .info-btn { width:36px; height:36px; flex-shrink:0; border-radius:8px; background:var(--surface2); border:1px solid var(--border); color:var(--blue); cursor:pointer; display:flex; align-items:center; justify-content:center; font-size:16px; font-weight:bold; transition:all 0.2s; }
  .info-btn:hover { background:var(--blue); color:#fff; }

  /* ===== CRITERION ROW ===== */
  .criterion-row { padding: 14px 16px; border-bottom: 1px solid rgba(255,255,255,0.03); display:flex; flex-direction:column; gap:10px; transition: all 0.3s; }
  .criterion-row:last-child { border-bottom: none; }
  .criterion-row.na-active .criterion-text { opacity: 0.4; }
  .criterion-row.na-active .criterion-pts { opacity: 0.4; text-decoration: line-through; }
  .criterion-text-box { display:flex; justify-content:space-between; align-items:flex-start; gap:12px; }
  .criterion-text { font-size:13.5px; line-height:1.6; color:var(--text); flex:1; display:flex; gap:8px; min-width:0; }
  .criterion-text::before { content:'◆'; color:var(--amber); font-size:9px; margin-top:5px; flex-shrink:0; }
  .criterion-pts { background:var(--surface2); color:var(--muted); font-size:11px; font-weight:700; padding:3px 7px; border-radius:5px; border:1px solid var(--border); white-space:nowrap; flex-shrink:0; }
  .card-actions { display:flex; gap:6px; align-items:center; flex-wrap:wrap; }
  .btn-action { padding:9px 14px; border-radius:9px; font-family:'DM Sans',sans-serif; font-size:12px; font-weight:600; cursor:pointer; border:none; transition:all 0.18s; display:flex; align-items:center; gap:5px; white-space:nowrap; }
  .btn-tespit { background:rgba(255,59,48,0.12); color:var(--red); border:1px solid rgba(255,59,48,0.25); }
  .btn-tespit:hover, .btn-tespit.active { background:var(--red); color:#fff; border-color:var(--red); box-shadow: 0 4px 14px rgba(255,59,48,0.4); }
  .btn-yok { background:rgba(48,209,88,0.1); color:var(--green); border:1px solid rgba(48,209,88,0.2); }
  .btn-yok:hover, .btn-yok.active { background:var(--green); color:#000; border-color:var(--green); box-shadow: 0 4px 14px rgba(48,209,88,0.35); }
  .btn-na { background:rgba(58,58,63,0.3); color:var(--muted); border:1px solid rgba(255,255,255,0.08); }
  .btn-na:hover, .btn-na.active { background:var(--gray); color:#ccc; border-color:var(--muted); }

  /* ===== EXTRAS ===== */
  .extras-area { padding: 0 16px 16px 16px; display:flex; flex-direction:column; gap:10px; }
  .image-upload-area { padding:12px; border-radius:10px; display:none; border:1.5px dashed rgba(255,59,48,0.3); background:rgba(255,59,48,0.04); }
  .image-upload-area.visible { display:block; animation: fadeIn 0.2s ease; }
  .upload-label { display:flex; align-items:center; gap:8px; cursor:pointer; font-size:13px; color:rgba(255,59,48,0.7); }
  .upload-label input { display:none; }
  .uploaded-images { display:flex; flex-wrap:wrap; gap:8px; margin-top:10px; }
  .uploaded-img-thumb { width:60px; height:60px; border-radius:7px; object-fit:cover; border:1px solid var(--border); cursor:pointer; }
  .note-input { width:100%; background:var(--surface2); border:1px solid var(--border); display:none; color:var(--text); border-radius:9px; padding:10px 13px; font-family:'DM Sans',sans-serif; font-size:13px; resize:vertical; min-height:60px; outline:none; }
  .note-input.visible { display:block; animation: fadeIn 0.2s ease; }

  /* ===== SECTION & PAGINATION ===== */
  .section-group { margin-bottom:16px; }
  .section-group-title { font-family:'Syne',sans-serif; font-weight:800; font-size:18px; margin-bottom:16px; display:flex; align-items:center; gap:10px; }
  .section-group-title::after { content:''; flex:1; height:1px; background:var(--border); }
  .section-icon { width:32px; height:32px; border-radius:8px; display:flex; align-items:center; justify-content:center; font-size:14px; background:var(--surface2); border:1px solid var(--border); flex-shrink:0; }
  .pagination-controls { display:flex; justify-content:space-between; align-items:center; margin-top:24px; padding-top:20px; border-top:1px solid var(--border); gap:8px; flex-wrap:wrap; }
  .page-indicator { font-family:'Syne',sans-serif; font-weight:700; color:var(--text); font-size:14px; }
  .btn-nav { background:var(--surface2); color:var(--text); border:1px solid var(--border); padding: 11px 18px; border-radius: 9px; cursor: pointer; font-weight: 600; font-size:13px; }
  .btn-nav:hover:not(:disabled) { background:var(--gray); }
  .btn-nav:disabled { opacity:.4; cursor:not-allowed; }
  .btn-finish { background: linear-gradient(135deg, var(--green), #28a745); color:#fff; border:none; box-shadow: 0 4px 14px rgba(48,209,88,0.3); }

  /* ===== FOOTER ===== */
  .site-footer { text-align:center; padding:16px; border-top:1px solid var(--border); font-size:12px; color:var(--muted); background:var(--surface); }
  .site-footer a { color:var(--blue); text-decoration:none; font-weight:600; }

  /* ===== MODALS ===== */
  .modal-overlay { display:none; position:fixed; inset:0; background:rgba(0,0,0,0.85); align-items:center; justify-content:center; backdrop-filter:blur(10px); animation: fadeIn 0.2s ease; padding:12px; overflow-y:auto; }
  .modal-overlay.open { display:flex; }
  .modal { background:var(--surface); border:1px solid var(--border); border-radius:18px; max-width:600px; width:100%; max-height:90vh; overflow:auto; padding:24px; position:relative; margin:auto; }
  .modal-close { position:absolute; top:14px; right:14px; width:30px; height:30px; background:var(--surface2); border:1px solid var(--border); border-radius:7px; color:var(--muted); cursor:pointer; font-size:15px; display:flex; align-items:center; justify-content:center; z-index:10; }
  .modal h2 { font-family:'Syne',sans-serif; font-size:20px; margin-bottom:14px; text-align:center; }
  .standards-list { list-style:none; padding:0; margin-top:10px; }
  .standards-list li { padding:9px 0; border-bottom:1px solid var(--border); font-size:13px; color:#ccc; line-height:1.6; display:flex; align-items:flex-start; gap:8px; }
  .standards-list li span.blue-arrow { color:var(--blue); font-weight:bold; font-size:13px; margin-top:1px; flex-shrink:0; }

  /* ===== FORMS ===== */
  .form-group { margin-bottom:14px; }
  .form-group label { display:block; font-size:11px; color:var(--muted); margin-bottom:5px; font-weight:600; text-transform:uppercase; }
  .form-input { width:100%; background:var(--surface2); border:1px solid var(--border); color:var(--text); padding:11px 12px; border-radius:9px; outline:none; font-family:'DM Sans'; font-size:14px; }
  .btn-start { width:100%; padding:13px; border-radius:9px; background:var(--primary); color:#fff; font-weight:700; font-family:'Syne'; border:none; cursor:pointer; margin-top:10px; font-size:15px; }
  .btn-start:hover { background:var(--primary-dark); }

  /* ===== REPORT TABLE ===== */
  .report-table { width:100%; border-collapse:collapse; font-size:12px; margin-bottom:20px; }
  .report-table th { background:var(--surface2); padding:9px 12px; text-align:left; font-family:'Syne',sans-serif; font-size:10px; text-transform:uppercase; color:var(--muted); border-bottom:1px solid var(--border); }
  .report-table td { padding:9px 12px; border-bottom:1px solid var(--border); color:var(--text); vertical-align:middle; line-height:1.5; }
  .badge-s { padding:3px 7px; border-radius:5px; font-size:10px; font-weight:700; white-space:nowrap; }
  .badge-s.t { background:rgba(255,59,48,0.2); color:var(--red); border:1px solid rgba(255,59,48,0.3); }
  .badge-s.y { background:rgba(48,209,88,0.2); color:var(--green); border:1px solid rgba(48,209,88,0.3); }
  .badge-s.n { background:rgba(58,58,63,0.3); color:var(--muted); border:1px solid var(--border); }
  .modal-score-box { flex:1; min-width:80px; background:var(--surface2); border:1px solid var(--border); border-radius:11px; padding:10px 14px; text-align:center; }
  .modal-score-box .v { font-family:'Syne',sans-serif; font-size:22px; font-weight:800; color:var(--amber); }
  .modal-score-box .l { font-size:10px; color:var(--muted); text-transform:uppercase; margin-top:2px; }
  .print-btn-large { background: linear-gradient(135deg, var(--blue), #0056b3); color: #fff; border: none; padding: 10px 20px; border-radius: 10px; font-family: 'Syne', sans-serif; font-weight: 700; font-size: 14px; cursor: pointer; display: inline-flex; align-items: center; gap: 7px; box-shadow: 0 4px 14px rgba(10,132,255,0.4); transition: all 0.2s; margin-bottom: 16px; }
  .print-btn-large:hover { transform: translateY(-2px); }

  @keyframes fadeIn { from{opacity:0;transform:translateY(4px)} to{opacity:1;transform:translateY(0)} }

  /* ===== MOBILE BREAKPOINTS ===== */
  @media (max-width: 600px) {
    .top-bar { height: auto; min-height: 56px; padding: 8px 12px; flex-wrap: wrap; gap: 6px; }
    .brand-name { font-size: 13px; }
    .brand-sub { display: none; }
    .audit-code-badge { font-size: 10px; padding: 4px 9px; }
    .score-pill .val { font-size: 15px; }
    .container { padding: 12px 8px; }
    .card-header { padding: 12px; gap: 8px; }
    .card-title { font-size: 13.5px; }
    .card-num { width: 34px; height: 34px; font-size: 12px; }
    .btn-action { padding: 8px 10px; font-size: 11px; }
    .criterion-row { padding: 12px; }
    .criterion-text { font-size: 13px; }
    .extras-area { padding: 0 12px 12px; }
    .progress-stats { gap: 8px; font-size: 10px; }
    .pagination-controls { justify-content: center; }
    .page-indicator { width: 100%; text-align: center; order: -1; }
    .modal { padding: 18px; max-height: 95vh; }
    .modal h2 { font-size: 17px; }
    .section-group-title { font-size: 15px; }
    .modal-score-box .v { font-size: 18px; }
    .report-table { font-size: 11px; }
    .report-table th, .report-table td { padding: 7px 8px; }
    .print-btn-large { font-size: 13px; padding: 9px 16px; width: 100%; justify-content: center; }
  }

  @media (max-width: 400px) {
    .btn-action { padding: 8px 8px; font-size: 10.5px; }
    .card-actions { gap: 4px; }
  }

  /* ===== PRINT ===== */
  @media print {
    @page { margin: 10mm; }
    html, body { display: block !important; position: static !important; background: #fff !important; color: #000 !important; height: auto !important; min-height: 100% !important; overflow: visible !important; margin: 0 !important; padding: 0 !important; }
    body > div:not(#reportModal) { display: none !important; }
    header, footer, nav, aside, .progress-container { display: none !important; }
    #reportModal { display: block !important; position: static !important; background: #fff !important; padding: 0 !important; margin: 0 !important; overflow: visible !important; height: auto !important; min-height: auto !important; }
    #reportModalContent { display: block !important; position: static !important; width: 100% !important; max-width: 100% !important; border: none !important; box-shadow: none !important; margin: 0 !important; padding: 0 !important; height: auto !important; max-height: none !important; overflow: visible !important; transform: none !important; }
    .print-hide, .modal-close { display: none !important; }
    .report-table { page-break-inside: auto !important; width: 100% !important; border-collapse: collapse !important; margin-bottom: 20px !important; }
    .report-table tr { page-break-inside: avoid !important; page-break-after: auto !important; }
    .report-table th { background: #f0f0f0 !important; color: #000 !important; border-bottom: 2px solid #ccc !important; -webkit-print-color-adjust: exact !important; print-color-adjust: exact !important; }
    .report-table td { border-bottom: 1px solid #e0e0e0 !important; color: #000 !important; page-break-inside: avoid !important; }
    .print-chapter-title { color: #000 !important; border-bottom: 2px solid #000 !important; margin-top: 30px !important; margin-bottom: 15px !important; page-break-after: avoid !important; font-size: 18px !important; font-weight: bold !important; }
    .badge-s { -webkit-print-color-adjust: exact !important; print-color-adjust: exact !important; border-radius: 6px !important; border: 1px solid transparent !important; }
    .badge-s.t { background: rgba(255,59,48,0.15) !important; color: #FF3B30 !important; border-color: rgba(255,59,48,0.3) !important; }
    .badge-s.y { background: rgba(48,209,88,0.15) !important; color: #1E8E3E !important; border-color: rgba(48,209,88,0.3) !important; }
    .badge-s.n { background: rgba(58,58,63,0.15) !important; color: #555 !important; border-color: #ccc !important; }
    .modal-score-box { background: #fafafa !important; border: 1px solid #ddd !important; -webkit-print-color-adjust: exact !important; print-color-adjust: exact !important; page-break-inside: avoid !important; }
    .modal-score-box .v { color: inherit !important; }
    .report-img-wrapper { page-break-inside: avoid !important; margin-top:8px !important; display:flex !important; gap:8px !important; flex-wrap:wrap !important; }
    .report-img { height:100px !important; width:100px !important; object-fit:cover !important; border-radius:4px !important; border:1px solid #aaa !important; }
  }
</style>

</head>
<body>

<!-- STARTUP MODAL -->

<div class="modal-overlay open" id="startupModal" style="z-index: 2000;">
  <div class="modal" style="max-width: 400px;">
    <h2>Yeni Denetim Başlat</h2>
    <div class="form-group"><label>Mağaza Kodu</label><input type="text" id="inpStoreCode" class="form-input" placeholder="Örn: 9070"></div>
    <div class="form-group"><label>Mağaza İsmi</label><input type="text" id="inpStoreName" class="form-input" placeholder="Mağaza adı..."></div>
    <div class="form-group"><label>Denetmen</label><input type="text" id="inpAuditor" class="form-input" placeholder="Ad Soyad..."></div>
    <button onclick="startAudit()" class="btn-start">Sistemi Başlat</button>
  </div>
</div>

<!-- ADMIN AUTH MODAL -->

<div class="modal-overlay print-hide" id="adminAuthModal" style="z-index: 2001;">
  <div class="modal" style="max-width: 400px;">
    <button class="modal-close" onclick="closeModal('adminAuthModal')">✕</button>
    <h2>Yetkili Girişi</h2>
    <div class="form-group"><label>Kullanıcı Adı</label><input type="text" id="inpAdminUser" class="form-input" placeholder="Kullanıcı adınızı girin"></div>
    <div class="form-group"><label>Şifre</label><input type="password" id="inpAdminPass" class="form-input" placeholder="••••••"></div>
    <button id="adminLoginBtn" onclick="checkAdminAuth()" class="btn-start">Giriş Yap</button>
  </div>
</div>

<!-- HEADER -->

<header class="top-bar print-hide">
  <div class="brand">
    <div class="brand-logo">F</div>
    <div class="brand-text">
      <div class="brand-name">FLO Operasyonel Denetim</div>
      <div class="brand-sub">2026 Denetim Sistemi</div>
    </div>
  </div>
  <div class="score-pill">
    <div class="val" id="totalScore">0 <span style="font-size:12px;color:var(--muted)">/ 100</span></div>
    <div class="lbl">Puan</div>
  </div>
  <div class="header-actions">
    <div class="audit-code-badge" id="auditCodeBadge">—</div>
    <button class="admin-btn" onclick="document.getElementById('adminAuthModal').classList.add('open')">Yönetim</button>
  </div>
</header>

<!-- PROGRESS -->

<div class="progress-container print-hide">
  <div class="progress-bar-wrap"><div class="progress-bar-fill" id="progressFill" style="width:0%"></div></div>
  <div class="progress-stats">
    <span><span class="dot" style="background:var(--red)"></span><span id="cntTespit">0</span> Tespit</span>
    <span><span class="dot" style="background:var(--green)"></span><span id="cntYok">0</span> Yok</span>
    <span><span class="dot" style="background:var(--gray)"></span><span id="cntNA">0</span> N/A</span>
    <span><span class="dot" style="background:var(--muted)"></span><span id="cntPending">0</span> Bekliyor</span>
  </div>
</div>

<main class="container print-hide" id="mainContainer"></main>

<footer class="site-footer print-hide">
  &copy; 2026 FLO Operasyonel Denetim Sistemi | Altyapı: <a href="https://ardaulas.online" target="_blank">ardaulas.online</a> | İletişim: <a href="/cdn-cgi/l/email-protection" class="__cf_email__" data-cfemail="b6d7c4d2d7f6d7c4d2d7c3dad7c598d9d8dadfd8d3">[email&#160;protected]</a>
</footer>

<!-- ADMIN DATA MODAL -->

<div class="modal-overlay print-hide" id="adminDataModal" style="z-index: 2002;">
  <div class="modal" style="max-width:960px">
    <button class="modal-close" onclick="closeModal('adminDataModal')">✕</button>
    <h2>Yönetim Paneli - Geçmiş Denetimler</h2>
    <div id="adminDataArea" style="margin-top:20px; text-align:center; color:var(--muted);">Veriler Yükleniyor...</div>
  </div>
</div>

<!-- DETAIL MODAL -->

<div class="modal-overlay print-hide" id="detailModal" style="z-index: 2003;">
  <div class="modal" id="detailModalContent" style="max-width:500px">
    <button class="modal-close print-hide" onclick="closeModal('detailModal')">✕</button>
    <div id="detailModalBody"></div>
  </div>
</div>

<!-- REPORT MODAL -->

// ==================== STATE ====================
const state_obj = {};
let totalCriteriaCount = 0;

AUDIT_DATA.forEach(d => {
state_obj[d.id] = { note:’’, images:[], criteriaStatus: new Array(d.criteria.length).fill(null) };
totalCriteriaCount += d.criteria.length;
});

// ==================== STARTUP ====================
function startAudit() {
const code    = document.getElementById(‘inpStoreCode’).value.trim();
const name    = document.getElementById(‘inpStoreName’).value.trim();
const auditor = document.getElementById(‘inpAuditor’).value.trim();
if(!code || !name || !auditor) { alert(“Lütfen tüm alanları eksiksiz doldurun.”); return; }
currentStoreCode = code; currentStoreName = name; currentAuditor = auditor;
const badge = document.getElementById(‘auditCodeBadge’);
badge.innerText = currentStoreName;
badge.style.display = ‘block’;
document.getElementById(‘startupModal’).classList.remove(‘open’);
currentQuestionIndex = 0;
render();
updateScores();
}

// ==================== ADMIN AUTH ====================
async function checkAdminAuth() {
const userInp = document.getElementById(‘inpAdminUser’).value.trim();
const passInp = document.getElementById(‘inpAdminPass’).value;
const btn = document.getElementById(‘adminLoginBtn’);
if(!userInp || !passInp) return alert(“Kullanıcı adı ve şifreyi giriniz.”);
const originalText = btn.innerText;
btn.innerText = “Doğrulanıyor…”; btn.disabled = true;
try {
const querySnapshot = await db.collection(“adminUsers”).where(“username”,”==”,userInp).where(“password”,”==”,passInp).get();
if (!querySnapshot.empty) {
document.getElementById(‘adminAuthModal’).classList.remove(‘open’);
openAdminPanel();
} else { alert(“Hatalı kullanıcı adı veya şifre!”); }
} catch(error) { console.error(“Giriş Hatası:”, error); alert(“Bağlantı hatası oluştu.”); }
finally { btn.innerText = originalText; btn.disabled = false; }
}

// ==================== RENDER ====================
function render() {
const container = document.getElementById(‘mainContainer’);
const item = AUDIT_DATA[currentQuestionIndex];
const g = SECTION_GROUPS[item.topic] || {icon:‘📌’,color:‘var(–muted)’};
const isLast = currentQuestionIndex === AUDIT_DATA.length - 1;
const nextBtnHtml = isLast
? `<button onclick="finishAudit()" class="btn-action btn-nav btn-finish">Denetimi Bitir ✓</button>`
: `<button onclick="nextQ()" class="btn-action btn-nav">Sonraki →</button>`;

container.innerHTML = ` <div class="section-group"> <div class="section-group-title"> <span class="section-icon">${g.icon}</span> <span style="color:${g.color}">${item.topic}</span> </div> ${renderCard(item)} </div> <div class="pagination-controls print-hide"> <button onclick="prevQ()" class="btn-action btn-nav" ${currentQuestionIndex===0?'disabled':''}>← Önceki</button> <div class="page-indicator">Madde ${currentQuestionIndex+1} / ${AUDIT_DATA.length}</div> ${nextBtnHtml} </div>`;
}

function prevQ() { if(currentQuestionIndex > 0) { currentQuestionIndex–; render(); window.scrollTo({top:0,behavior:‘smooth’}); } }
function nextQ() { if(currentQuestionIndex < AUDIT_DATA.length-1) { currentQuestionIndex++; render(); window.scrollTo({top:0,behavior:‘smooth’}); } }

function renderCard(item) {
const s = state_obj[item.id];
let criteriaHtml = ‘’;
let showExtras = false;

item.criteria.forEach((c, idx) => {
const cStatus = s.criteriaStatus[idx];
if(cStatus===‘tespit’||cStatus===‘yok’) showExtras = true;
const rowClass = cStatus===‘na’?‘na-active’:’’;
criteriaHtml += ` <div class="criterion-row ${rowClass}"> <div class="criterion-text-box"> <div class="criterion-text">${c.text}</div> <div class="criterion-pts">${c.puan} P</div> </div> <div class="card-actions"> <button class="btn-action btn-tespit ${cStatus==='tespit'?'active':''}" onclick="setCriterionStatus(${item.id},${idx},'tespit')">⚠ Tespit Var</button> <button class="btn-action btn-yok ${cStatus==='yok'?'active':''}" onclick="setCriterionStatus(${item.id},${idx},'yok')">✓ Tespit Yok</button> <button class="btn-action btn-na ${cStatus==='na'?'active':''}" onclick="setCriterionStatus(${item.id},${idx},'na')">— N/A</button> </div> </div>`;
});

const isAnyTespit = s.criteriaStatus.includes(‘tespit’);
return `

  <div class="audit-card" id="card-${item.id}">
    <div class="card-header">
      <div class="card-num">${String(item.id).padStart(2,'0')}</div>
      <div class="card-meta">
        <div class="card-code">${item.code} • Max: ${item.puan} Puan</div>
        <div class="card-title">${item.title}</div>
      </div>
      <button class="info-btn" title="Kriter Standartları" onclick="showDetail(${item.id})">ℹ</button>
    </div>
    <div class="criteria-list">${criteriaHtml}</div>
    <div class="extras-area">
      <div class="image-upload-area ${isAnyTespit?'visible':''}" id="imgArea-${item.id}">
        <label class="upload-label">
          <svg width="17" height="17" fill="none" stroke="currentColor" stroke-width="2" viewBox="0 0 24 24"><rect x="3" y="3" width="18" height="18" rx="2"/><circle cx="8.5" cy="8.5" r="1.5"/><polyline points="21 15 16 10 5 21"/></svg>
          Fotoğraf Yükle (Opsiyonel)
          <input type="file" accept="image/*" multiple onchange="addImages(${item.id},this)">
        </label>
        <div class="uploaded-images" id="imgs-${item.id}">
          ${s.images.map((src,i)=>`<img class="uploaded-img-thumb" src="${src}" onclick="removeImage(${item.id},${i})" title="Kaldır">`).join('')}
        </div>
      </div>
      <textarea class="note-input ${showExtras?'visible':''}" placeholder="Açıklama veya not ekleyin…" onchange="setNote(${item.id},this.value)">${s.note}</textarea>
    </div>
  </div>`;
}

// ==================== ACTIONS ====================
function setCriterionStatus(itemId, idx, status) {
state_obj[itemId].criteriaStatus[idx] = state_obj[itemId].criteriaStatus[idx]===status ? null : status;
render(); updateScores();
}
function setNote(id, val) { state_obj[id].note = val; }
function addImages(id, input) {
Array.from(input.files).forEach(f => {
const r = new FileReader(); r.onload = e => { state_obj[id].images.push(e.target.result); render(); }; r.readAsDataURL(f);
});
}
function removeImage(id, idx) { state_obj[id].images.splice(idx,1); render(); }

function updateScores() {
let earned = 0, answered = 0, cT=0, cY=0, cN=0;
AUDIT_DATA.forEach(d => {
d.criteria.forEach((c, idx) => {
const st = state_obj[d.id].criteriaStatus[idx];
if(st) answered++;
if(st===‘yok’||st===‘na’) earned += c.puan;
if(st===‘tespit’) cT++; else if(st===‘yok’) cY++; else if(st===‘na’) cN++;
});
});
const elScore   = document.getElementById(‘totalScore’);
const elFill    = document.getElementById(‘progressFill’);
const elTespit  = document.getElementById(‘cntTespit’);
const elYok     = document.getElementById(‘cntYok’);
const elNA      = document.getElementById(‘cntNA’);
const elPending = document.getElementById(‘cntPending’);
if(elScore)   elScore.innerHTML = earned + ’ <span style="font-size:12px;color:var(--muted)">/ 100</span>’;
if(elFill)    elFill.style.width = (answered/totalCriteriaCount*100)+’%’;
if(elTespit)  elTespit.textContent = cT;
if(elYok)     elYok.textContent = cY;
if(elNA)      elNA.textContent = cN;
if(elPending) elPending.textContent = (totalCriteriaCount-answered);
}

// ==================== DETAIL MODAL ====================
function showDetail(id) {
const item = AUDIT_DATA.find(d=>d.id===id);
const listHtml = item.standards.split(’\n’).filter(l=>l.trim()).map(l =>
`<li><span class="blue-arrow">→</span><span>${l.replace(/^•\s*/,'')}</span></li>`
).join(’’);
document.getElementById(‘detailModalBody’).innerHTML = ` <div style="color:var(--primary);font-size:11px;font-weight:700;margin-bottom:8px;">${item.code} • ${item.topic}</div> <h2 style="font-family:'Syne',sans-serif;font-size:17px;line-height:1.4;">${item.title}</h2> <div style="margin-top:18px;"> <h4 style="color:var(--blue);font-family:'Syne',sans-serif;text-transform:uppercase;font-size:11px;margin-bottom:6px;">Kriter Standartları</h4> <ul class="standards-list">${listHtml}</ul> </div>`;
document.getElementById(‘detailModal’).classList.add(‘open’);
}

// ==================== FINISH & FIREBASE ====================
function finishAudit() {
let unanswered = 0;
AUDIT_DATA.forEach(d => { d.criteria.forEach((c, idx) => { if(!state_obj[d.id].criteriaStatus[idx]) unanswered++; }); });
if(unanswered > 0) { alert(`Eksik işlem tespit edildi! ${unanswered} adet kriter yanıtlanmamış.`); return; }

const btn = document.querySelector(’.btn-finish’);
if(btn) btn.innerHTML = “Oluşturuluyor ⌛”;

let finalScore = 0;
AUDIT_DATA.forEach(d => {
d.criteria.forEach((c, idx) => {
const st = state_obj[d.id].criteriaStatus[idx];
if(st === ‘yok’ || st === ‘na’) finalScore += c.puan;
});
});
finalScore = String(finalScore);
const auditDetails = AUDIT_DATA.map(d => ({
code: d.code, topic: d.topic, title: d.title,
note: state_obj[d.id].note, images: state_obj[d.id].images,
results: d.criteria.map((c, idx) => ({ text: c.text, status: state_obj[d.id].criteriaStatus[idx], puan: c.puan }))
}));

const payload = { storeCode:currentStoreCode, storeName:currentStoreName, auditor:currentAuditor, date:new Date().toISOString(), score:finalScore, details:auditDetails };

if(db) {
db.collection(“denetimler”).add(payload).then(()=>console.log(“DB’ye işlendi.”)).catch(e=>console.error(“Kayıt hatası:”,e));
}
setTimeout(() => { generateReportHTML(payload); if(btn) btn.innerHTML = “Denetimi Bitir ✓”; }, 300);
}

// ==================== ADMIN PANEL ====================
async function openAdminPanel() {
document.getElementById(‘adminDataModal’).classList.add(‘open’);
const area = document.getElementById(‘adminDataArea’);
if(!db) { area.innerHTML = “<p style='color:red;'>Sunucu bağlantısı kurulamadı.</p>”; return; }
area.innerHTML = “Veriler Yükleniyor…”;
try {
const snapshot = await db.collection(“denetimler”).orderBy(“date”,“desc”).get();
if(snapshot.empty) { area.innerHTML = “<p>Henüz kayıtlı denetim yok.</p>”; return; }
adminDataCache = {};
let html = `<div style="overflow-x:auto;"><table class="report-table"><thead><tr><th>Tarih</th><th>Kod</th><th>Mağaza</th><th>Denetmen</th><th>Puan</th><th>Rapor</th></tr></thead><tbody>`;
snapshot.forEach(doc => {
const data = doc.data(); adminDataCache[doc.id] = data;
const d = new Date(data.date).toLocaleDateString(‘tr-TR’,{day:‘2-digit’,month:‘2-digit’,year:‘numeric’,hour:‘2-digit’,minute:‘2-digit’});
html += `<tr><td>${d}</td><td style="font-weight:bold;color:var(--primary)">${data.storeCode}</td><td>${data.storeName}</td><td>${data.auditor}</td><td style="font-weight:bold;color:var(--green)">${data.score}</td><td><button class="btn-action btn-yok" style="padding:5px 9px;font-size:11px;" onclick="viewPastReport('${doc.id}')">Görüntüle</button></td></tr>`;
});
html += `</tbody></table></div>`;
area.innerHTML = html;
} catch(err) { area.innerHTML = `<p style="color:red;">Hata: ${err.message}</p>`; }
}

function viewPastReport(docId) { const data = adminDataCache[docId]; if(data) generateReportHTML(data); }

// ==================== RAPOR ====================
function generateReportHTML(dataObj) {
const groups = {}; let cT=0, cY=0, cN=0;
dataObj.details.forEach(d => {
if(!groups[d.topic]) groups[d.topic] = [];
groups[d.topic].push(d);
d.results.forEach(res => { if(res.status===‘na’) cN++; else if(res.status===‘yok’) cY++; else if(res.status===‘tespit’) cT++; });
});

let chaptersHtml = ‘’;
for(const [topic, items] of Object.entries(groups)) {
let rows = ‘’;
items.forEach(d => {
d.results.forEach((res, idx) => {
const badge = res.status===‘tespit’?’<span class="badge-s t">Tespit Var</span>’:res.status===‘yok’?’<span class="badge-s y">Tespit Yok</span>’:res.status===‘na’?’<span class="badge-s n">N/A</span>’:’<span style="color:var(--muted);font-size:11px">—</span>’;
const pts = (res.status===‘yok’||res.status===‘na’) ? res.puan : res.status===‘tespit’ ? 0 : ‘?’;
let extrasHtml = ‘’;
if(idx===d.results.length-1) {
if(d.note) extrasHtml += `<div style="font-size:11px;color:var(--muted);margin-top:5px;font-style:italic;">Not: ${d.note}</div>`;
if(d.images&&d.images.length>0) extrasHtml += `<div class="report-img-wrapper">${d.images.map(img=>`<img src="${img}" class="report-img">`).join('')}</div>`;
}
const codeCell = idx===0 ? `<td rowspan="${d.results.length}" style="color:var(--primary);font-weight:700;width:11%;border-right:1px solid var(--border);">${d.code}</td>` : ‘’;
rows += `<tr style="${res.status==='na'?'opacity:.6':''}">${codeCell}<td><span style="font-weight:500">${res.text}</span>${extrasHtml}</td><td style="width:14%">${badge}</td><td style="text-align:center;font-family:'Syne',sans-serif;font-weight:700;color:var(--amber);width:8%">${pts}</td></tr>`;
});
});
chaptersHtml += `<div class="print-chapter-title" style="font-family:'Syne',sans-serif;font-size:17px;font-weight:800;padding-bottom:8px;margin:24px 0 12px;border-bottom:1px solid var(--border);">${topic}</div><div style="overflow-x:auto;"><table class="report-table"><thead><tr><th>Kod</th><th>Değerlendirilen Kriter</th><th>Sonuç</th><th style="text-align:center">Puan</th></tr></thead><tbody>${rows}</tbody></table></div>`;
}

document.getElementById(‘reportModalBody’).innerHTML = ` <div style="text-align:center;margin-bottom:24px;border-bottom:1px solid var(--border);padding-bottom:20px;"> <h2 style="font-family:'Syne',sans-serif;font-size:22px;font-weight:800;margin-bottom:6px;">Operasyonel Denetim Sonuç Raporu</h2> <p style="color:var(--muted);font-size:13px;margin-bottom:18px;"> Mağaza: <strong style="color:var(--primary)">${dataObj.storeCode} - ${dataObj.storeName}</strong> &bull; Denetmen: <strong style="color:var(--primary)">${dataObj.auditor}</strong> &bull; ${new Date(dataObj.date).toLocaleDateString('tr-TR',{day:'2-digit',month:'long',year:'numeric',hour:'2-digit',minute:'2-digit'})} </p> <button class="print-btn-large print-hide" onclick="window.print()"> <svg width="18" height="18" fill="none" stroke="currentColor" stroke-width="2" viewBox="0 0 24 24"><path d="M6 9V2h12v7M6 18H4a2 2 0 01-2-2v-5a2 2 0 012-2h16a2 2 0 012 2v5a2 2 0 01-2 2h-2M6 14h12v8H6z"/></svg> Raporu PDF Olarak İndir / Yazdır </button> </div> <div style="display:flex;gap:10px;margin-bottom:20px;flex-wrap:wrap;"> <div class="modal-score-box"><div class="v">${dataObj.score}</div><div class="l">Mevcut Puan</div></div> <div class="modal-score-box"><div class="v" style="color:var(--red)">${cT}</div><div class="l">Tespit</div></div> <div class="modal-score-box"><div class="v" style="color:var(--green)">${cY}</div><div class="l">Tespit Yok</div></div> <div class="modal-score-box"><div class="v" style="color:var(--muted)">${cN}</div><div class="l">N/A</div></div> </div> ${chaptersHtml}`;
document.getElementById(‘reportModal’).classList.add(‘open’);
}

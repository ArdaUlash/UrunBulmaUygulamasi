<!DOCTYPE html>
<html lang="tr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Görsel Etiket Yönetimi</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://cdn.jsdelivr.net/npm/sweetalert2@11"></script>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
    <style>
        body { font-family: 'Inter', sans-serif; background-color: #f3f4f6; }
        .page-container { display: none; animation: fadeIn 0.3s ease-in-out; }
        .active-page { display: block; }
        @keyframes fadeIn {
            from { opacity: 0; transform: translateY(10px); }
            to { opacity: 1; transform: translateY(0); }
        }
        /* Numara giriş kutusundaki okları gizleyip temiz bir arayüz sağlar */
        input[type=number]::-webkit-inner-spin-button, 
        input[type=number]::-webkit-outer-spin-button { 
            -webkit-appearance: none; 
            margin: 0; 
        }
    </style>
</head>
<body class="p-4 sm:p-6 lg:p-8 max-w-md mx-auto bg-gray-50 min-h-screen">

    <div class="flex justify-between items-center bg-white p-4 rounded-xl shadow-sm mb-6">
        <h1 class="text-xl font-bold text-gray-800">Etiket Sistemi</h1>
        <button id="connectBtn" onclick="connectBluetooth()" class="bg-blue-600 text-white px-4 py-2 rounded-lg text-sm font-medium shadow hover:bg-blue-700 transition">
            Yazıcıya Bağlan
        </button>
    </div>
    <div id="statusIndicator" class="text-center text-sm font-medium text-red-500 mb-6 bg-red-50 py-2 rounded-lg border border-red-100">
        Durum: Bağlı Değil
    </div>

    <div id="page1" class="page-container active-page">
        <div class="mb-6 text-center">
            <button onclick="sendConfig()" class="w-full bg-slate-800 text-white py-4 rounded-xl font-semibold text-lg shadow-md hover:bg-slate-700 transition">
                Konfigürasyon Gönder
            </button>
            <p class="text-xs italic text-gray-500 mt-2">Yalnızca aksesuar etiket kullanınız!</p>
        </div>

        <div class="mb-6">
            <h2 class="text-sm font-semibold text-gray-600 mb-3 uppercase tracking-wider">Numaratör</h2>
            <div id="numeratorGrid" class="grid grid-cols-5 gap-2">
                </div>
        </div>

        <div>
            <button onclick="switchPage('page2')" class="w-full bg-gray-200 text-gray-800 py-3 rounded-xl font-medium shadow-sm border border-gray-300 hover:bg-gray-300 transition flex justify-center items-center gap-2">
                Diğer İşlemler <span>&rarr;</span>
            </button>
        </div>
    </div>

    <div id="page2" class="page-container">
        <div class="mb-6 text-center">
            <button onclick="sendConfig()" class="w-full bg-slate-800 text-white py-4 rounded-xl font-semibold text-lg shadow-md hover:bg-slate-700 transition">
                Konfigürasyon Gönder
            </button>
            <p class="text-xs italic text-red-500 mt-2">İmha ve Tedarikci iade etiketlerinde sticker etiket kullanınız!</p>
        </div>

        <div class="space-y-3 mb-6">
            <button onclick="printWithQuantity('nps')" class="w-full bg-indigo-500 text-white py-3 rounded-xl font-medium shadow hover:bg-indigo-600 transition uppercase">
                NPS ETİKETİ
            </button>
            
            <button onclick="printWithQuantity('tedarikci')" class="w-full bg-orange-500 text-white py-3 rounded-xl font-medium shadow hover:bg-orange-600 transition uppercase">
                TEDARİKÇİ İADE
            </button>
            
            <button onclick="printWithQuantity('imha')" class="w-full bg-red-600 text-white py-3 rounded-xl font-medium shadow hover:bg-red-700 transition uppercase">
                İMHA
            </button>

            <button onclick="printWithQuantity('sdi')" class="w-full bg-teal-500 text-white py-3 rounded-xl font-medium shadow hover:bg-teal-600 transition uppercase">
                SDİ
            </button>

            <button onclick="printBarcodeLabel()" class="w-full bg-purple-600 text-white py-3 rounded-xl font-medium shadow hover:bg-purple-700 transition uppercase">
                Barkodlu Etiket
            </button>
        </div>

        <div>
            <button onclick="switchPage('page1')" class="w-full bg-gray-200 text-gray-800 py-3 rounded-xl font-medium shadow-sm border border-gray-300 hover:bg-gray-300 transition flex justify-center items-center gap-2">
                <span>&larr;</span> Geri Dön
            </button>
        </div>
    </div>

    <script>
        // --- BLUETOOTH & ZEBRA MİMARİSİ ---
        let bluetoothDevice;
        let writeCharacteristic;
        
        const ZEBRA_SERVICE_UUID = '38eb4a80-c570-11e3-9507-0002a5d5c51b';
        const ZEBRA_WRITE_UUID = '38eb4a82-c570-11e3-9507-0002a5d5c51b';

        async function connectBluetooth() {
            try {
                bluetoothDevice = await navigator.bluetooth.requestDevice({
                    acceptAllDevices: true,
                    optionalServices: [ZEBRA_SERVICE_UUID]
                });

                const server = await bluetoothDevice.gatt.connect();
                const service = await server.getPrimaryService(ZEBRA_SERVICE_UUID);
                writeCharacteristic = await service.getCharacteristic(ZEBRA_WRITE_UUID);

                updateStatus(true);

                bluetoothDevice.addEventListener('gattserverdisconnected', () => {
                    updateStatus(false);
                });

                Swal.fire({ icon: 'success', title: 'Bağlantı Başarılı', text: 'Zebra yazıcıya bağlanıldı.', timer: 1500, showConfirmButton: false });

            } catch (error) {
                console.error("BT Hatası:", error);
                Swal.fire('Bağlantı Hatası', 'Yazıcıya bağlanılamadı veya işlem iptal edildi.', 'error');
            }
        }

        function updateStatus(isConnected) {
            const statusDiv = document.getElementById('statusIndicator');
            const btn = document.getElementById('connectBtn');
            if (isConnected) {
                statusDiv.innerText = 'Durum: Zebra Yazıcıya Bağlı';
                statusDiv.className = 'text-center text-sm font-medium text-green-600 mb-6 bg-green-50 py-2 rounded-lg border border-green-200';
                btn.innerText = 'Bağlı';
                btn.classList.replace('bg-blue-600', 'bg-green-600');
            } else {
                statusDiv.innerText = 'Durum: Bağlı Değil';
                statusDiv.className = 'text-center text-sm font-medium text-red-500 mb-6 bg-red-50 py-2 rounded-lg border border-red-100';
                btn.innerText = 'Yazıcıya Bağlan';
                btn.classList.replace('bg-green-600', 'bg-blue-600');
            }
        }

        async function printZPL(zplString) {
            if (!writeCharacteristic) {
                Swal.fire('Uyarı', 'Lütfen önce yazıcıya bağlanın!', 'warning');
                return;
            }
            try {
                const encoder = new TextEncoder();
                const data = encoder.encode(zplString);
                
                const chunkSize = 512;
                for (let i = 0; i < data.length; i += chunkSize) {
                    await writeCharacteristic.writeValue(data.slice(i, i + chunkSize));
                }
                
                Swal.fire({ toast: true, position: 'top-end', icon: 'success', title: 'Yazdırılıyor...', showConfirmButton: false, timer: 1000 });
            } catch (error) {
                console.error("Yazdırma Hatası:", error);
                Swal.fire('Hata', 'Yazdırma sırasında bir hata oluştu.', 'error');
            }
        }

        // --- SAYFA YÖNETİMİ ---
        function switchPage(pageId) {
            document.querySelectorAll('.page-container').forEach(el => el.classList.remove('active-page'));
            document.getElementById(pageId).classList.add('active-page');
        }

        // --- DİNAMİK NUMARATÖR OLUŞTURMA (17 - 46 NUMARA) ---
        const numeratorGrid = document.getElementById('numeratorGrid');
        for (let i = 17; i <= 46; i++) {
            const btn = document.createElement('button');
            btn.className = "bg-white border border-gray-300 text-gray-700 py-2 rounded-lg font-bold shadow-sm hover:bg-blue-50 hover:text-blue-600 transition";
            btn.innerText = i;
            btn.onclick = () => sendNumerator(i);
            numeratorGrid.appendChild(btn);
        }

        // --- ZPL KOMUTLARI ---

        // 1. Konfigürasyon
        function sendConfig() {
            const zpl = `! U1 setvar "media.type" "label"\r\n! U1 setvar "media.sense_mode" "gap"\r\n~jc\r\n`;
            printZPL(zpl);
        }

        // 2. Numaratör
        function sendNumerator(num) {
            const zpl = `^XA
^PW400
^LL240
^PQ1
^FO50,50
^A0N,190,170
^FB360,2,10,C,0
^FD${num}^FS
^XZ`;
            printZPL(zpl);
        }

        // 3. Adet İsteyen Özel Etiketler (NPS, Tedarikçi, İmha, SDİ)
        async function printWithQuantity(type) {
            // İlgili etiketin başlığını belirle
            let baslik = '';
            let btnColor = '';
            if(type === 'nps') { baslik = 'NPS'; btnColor = '#6366f1'; }
            else if(type === 'tedarikci') { baslik = 'Tedarikçi İade'; btnColor = '#f97316'; }
            else if(type === 'imha') { baslik = 'İmha'; btnColor = '#dc2626'; }
            else if(type === 'sdi') { baslik = 'SDİ'; btnColor = '#14b8a6'; }

            // Profesyonel ve hizalı SweetAlert2 Miktar Seçici Arayüzü
            const { value: qty } = await Swal.fire({
                title: `<span class="text-xl font-bold text-gray-800">${baslik} Etiketi</span>`,
                html: `
                    <div class="flex flex-col items-center justify-center mt-4 mb-2">
                        <p class="text-sm text-gray-500 mb-5 font-medium">Kaç adet yazdırmak istiyorsunuz?</p>
                        <div class="flex items-center gap-4">
                            <button type="button" onclick="document.getElementById('swal-qty').stepDown()" class="w-14 h-14 flex items-center justify-center bg-gray-100 border border-gray-300 rounded-xl text-gray-700 hover:bg-gray-200 active:bg-gray-300 text-3xl font-medium transition-colors shadow-sm select-none">-</button>
                            
                            <input id="swal-qty" type="number" min="1" value="1" class="w-24 h-14 text-center text-3xl font-bold bg-white border-2 border-gray-300 rounded-xl focus:outline-none focus:border-blue-500 focus:ring-1 focus:ring-blue-500 transition-all m-0 shadow-inner">
                            
                            <button type="button" onclick="document.getElementById('swal-qty').stepUp()" class="w-14 h-14 flex items-center justify-center text-white rounded-xl active:opacity-80 text-3xl font-medium transition-colors shadow-sm select-none" style="background-color: ${btnColor};">+</button>
                        </div>
                    </div>
                `,
                showCancelButton: true,
                confirmButtonText: 'Yazdır',
                cancelButtonText: 'İptal',
                confirmButtonColor: btnColor,
                cancelButtonColor: '#9ca3af',
                customClass: {
                    popup: 'rounded-3xl',
                    confirmButton: 'rounded-xl px-8 py-3 font-semibold text-sm tracking-wide',
                    cancelButton: 'rounded-xl px-8 py-3 font-semibold text-sm tracking-wide'
                },
                preConfirm: () => {
                    const value = document.getElementById('swal-qty').value;
                    if (!value || value <= 0) {
                        Swal.showValidationMessage('Geçerli bir adet girmelisiniz!');
                        return false;
                    }
                    return value;
                }
            });

            if (qty) {
                let zpl = "";
                
                if (type === 'nps') {
                    zpl = `^XA
^PW400
^LL240
^PQ${qty}
^FO20,30
^A0N,30,30
^FB360,5,10,C,0
^FD
Gorusleriniz bizim icin degerli! \\&
SMS ile gelecek ankete 10 puan vermek ister misiniz?
\\& Tesekkurler
^FS
^XZ`;
                } else if (type === 'tedarikci') {
                    zpl = `^XA
^PW400
^LL240
^PQ${qty}
^FO130,30
^A0R,80,80
^FB360,2,10,C,0
^FDTEDARiKCi^FS
^PW400
^LL240
^PQ${qty}
^FO1,10
^A0R,100,100
^FB360,2,10,C,0
^FDiADE^FS
^PW400
^LL240
^FO30,30
^A0R,40,40
^FB400,2,10,C,0
^FDIdes merkez onay^FS
^XZ`;
                } else if (type === 'imha') {
                    zpl = `^XA
^PW400
^LL240
^PQ${qty}
^FO1,50
^A0R,150,150
^FB360,2,20,C,0
^FDiMHA^FS
^PW400
^LL240
^FO70,30
^A0R,40,40
^FB400,2,10,C,0
^FDIdes merkez onay^FS
^XZ`;
                } else if (type === 'sdi') {
                    zpl = `^XA 
^PW400 
^LL240 
^PQ${qty} 
^FO20,50 
^A0N,90,70 
^FB360,2,10,C,0 
^FDSDI^FS
^FO0,125 
^A0N,25,25 
^FB360,2,10,C,0 
^FDHATA DETAYI:
^FS
^XZ`;
                }
                printZPL(zpl);
            }
        }

        // 4. Barkodlu Etiket (Alt Metin + Barkod + Adet)
        async function printBarcodeLabel() {
            const { value: formValues } = await Swal.fire({
                title: '<span class="text-xl font-bold text-gray-800">Barkod Bilgileri</span>',
                html:
                    '<input id="swal-input1" class="swal2-input !w-[80%] !rounded-xl !border-gray-300 focus:!border-purple-500 focus:!ring-purple-500" placeholder="Alt Metin (Örn: Model vs.)">' +
                    '<input id="swal-input2" type="number" class="swal2-input !w-[80%] !rounded-xl !border-gray-300 focus:!border-purple-500 focus:!ring-purple-500" placeholder="Barkod Numarası">' +
                    '<input id="swal-input3" type="number" class="swal2-input !w-[80%] !rounded-xl !border-gray-300 focus:!border-purple-500 focus:!ring-purple-500" placeholder="Adet" value="1">',
                focusConfirm: false,
                showCancelButton: true,
                confirmButtonText: 'Oluştur ve Yazdır',
                cancelButtonText: 'İptal',
                confirmButtonColor: '#9333ea',
                cancelButtonColor: '#9ca3af',
                customClass: {
                    popup: 'rounded-3xl',
                    confirmButton: 'rounded-xl px-6 py-2.5 font-semibold text-sm',
                    cancelButton: 'rounded-xl px-6 py-2.5 font-semibold text-sm'
                },
                preConfirm: () => {
                    const altMetin = document.getElementById('swal-input1').value;
                    const barkod = document.getElementById('swal-input2').value;
                    const adet = document.getElementById('swal-input3').value;
                    
                    if (!altMetin || !barkod || !adet) {
                        Swal.showValidationMessage('Lütfen tüm alanları doldurun');
                        return false;
                    }
                    return { altMetin, barkod, adet };
                }
            });

            if (formValues) {
                const zpl = `^XA
^PQ${formValues.adet}
^PW400
^LL240
^CI28
^FO20,53^A0N,50,50^FB360,1,0,C^FD${formValues.altMetin}^FS
^FO50,100^BY2^BCN,100,Y,N,N^FD${formValues.barkod}^FS
^XZ`;
                printZPL(zpl);
            }
        }
    </script>
</body>
</html>

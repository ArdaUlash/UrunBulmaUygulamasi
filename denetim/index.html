<!DOCTYPE html>
<html lang="tr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>FLO Denetim Sistemi | ardaulas.online</title>
<link href="https://fonts.googleapis.com/css2?family=Syne:wght@400;600;700;800&family=DM+Sans:wght@300;400;500;600&display=swap" rel="stylesheet">
<script src="https://www.gstatic.com/firebasejs/9.22.2/firebase-app-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/9.22.2/firebase-firestore-compat.js"></script>

<style>
  :root {
    --primary: #FF3B30; 
    --primary-dark: #C0271E; 
    --bg: #0D0D0F; 
    --surface: #17171A;
    --surface2: #1E1E23; 
    --border: rgba(255,255,255,0.07); 
    --text: #F0F0F0; 
    --muted: #888;
    --green: #30D158; 
    --red: #FF3B30; 
    --amber: #FF9F0A; 
    --blue: #0A84FF; 
    --gray: #3A3A3F;
  }
  
  * { 
    margin: 0; 
    padding: 0; 
    box-sizing: border-box; 
  }
  
  body { 
    font-family: 'DM Sans', sans-serif; 
    background: var(--bg); 
    color: var(--text); 
    min-height: 100vh; 
    display: flex; 
    flex-direction: column; 
  }

  /* HEADER & TOP BAR */
  .top-bar { 
    position: sticky; 
    top: 0; 
    z-index: 100; 
    background: rgba(13,13,15,0.92); 
    backdrop-filter: blur(20px); 
    border-bottom: 1px solid var(--border); 
    padding: 0 32px; 
    display: flex; 
    align-items: center; 
    justify-content: space-between; 
    height: 64px; 
  }
  
  .brand { 
    display: flex; 
    align-items: center; 
    gap: 12px; 
  }
  
  .brand-logo { 
    width: 36px; 
    height: 36px; 
    background: var(--primary); 
    border-radius: 8px; 
    display: flex; 
    align-items: center; 
    justify-content: center; 
    font-family: 'Syne', sans-serif; 
    font-weight: 800; 
    font-size: 16px; 
    color: #fff; 
  }
  
  .brand-name { 
    font-family: 'Syne', sans-serif; 
    font-weight: 700; 
    font-size: 18px; 
    letter-spacing: -0.3px; 
  }
  
  .brand-sub { 
    font-size: 12px; 
    color: var(--muted); 
    margin-top: -2px; 
  }

  .audit-code-badge { 
    background: linear-gradient(135deg, var(--primary), #FF6B6B); 
    padding: 6px 16px; 
    border-radius: 20px; 
    font-family: 'Syne', sans-serif; 
    font-weight: 700; 
    font-size: 13px; 
    letter-spacing: 1px; 
    box-shadow: 0 4px 20px rgba(255,59,48,0.35); 
  }
  
  .header-actions { 
    display: flex; 
    gap: 16px; 
    align-items: center; 
  }
  
  .admin-btn { 
    background: var(--surface2); 
    border: 1px solid var(--border); 
    color: var(--text); 
    padding: 6px 12px; 
    border-radius: 8px; 
    font-size: 12px; 
    font-weight: 600; 
    cursor: pointer; 
    transition: all 0.2s; 
  }
  
  .admin-btn:hover { 
    background: var(--blue); 
    border-color: var(--blue); 
    color: #fff; 
  }

  .score-display { 
    display: flex; 
    align-items: center; 
    gap: 24px; 
  }
  
  .score-pill { 
    background: var(--surface2); 
    border: 1px solid var(--border); 
    border-radius: 12px; 
    padding: 8px 20px; 
    text-align: center; 
  }
  
  .score-pill .val { 
    font-family: 'Syne', sans-serif; 
    font-size: 22px; 
    font-weight: 800; 
    background: linear-gradient(135deg, #fff, var(--amber)); 
    -webkit-background-clip: text; 
    -webkit-text-fill-color: transparent; 
    line-height: 1; 
  }
  
  .score-pill .lbl { 
    font-size: 10px; 
    color: var(--muted); 
    text-transform: uppercase; 
    letter-spacing: 1px; 
    margin-top: 2px; 
  }

  /* PROGRESS BAR */
  .progress-container { 
    padding: 12px 32px; 
    background: var(--surface); 
    border-bottom: 1px solid var(--border); 
    display: flex; 
    align-items: center; 
    gap: 16px; 
  }
  
  .progress-bar-wrap { 
    flex: 1; 
    height: 4px; 
    background: var(--surface2); 
    border-radius: 2px; 
    overflow: hidden; 
  }
  
  .progress-bar-fill { 
    height: 100%; 
    border-radius: 2px; 
    transition: width 0.5s ease; 
    background: linear-gradient(90deg, var(--primary), var(--amber)); 
  }
  
  .progress-stats { 
    display: flex; 
    gap: 20px; 
    font-size: 12px; 
    color: var(--muted); 
  }
  
  .progress-stats span { 
    display: flex; 
    align-items: center; 
    gap: 6px; 
  }
  
  .dot { 
    width: 8px; 
    height: 8px; 
    border-radius: 50%; 
    display: inline-block; 
  }

  /* MAIN CONTENT */
  .container { 
    max-width: 960px; 
    margin: 0 auto; 
    padding: 32px 24px; 
    flex: 1; 
    width: 100%; 
  }

  /* CARD & CRITERIA UI */
  .audit-card { 
    background: var(--surface); 
    border: 1px solid var(--border); 
    border-radius: 16px; 
    margin-bottom: 12px; 
    overflow: hidden; 
    animation: fadeIn 0.3s ease; 
    position: relative; 
  }
  
  .card-header { 
    padding: 20px; 
    display: grid; 
    grid-template-columns: auto 1fr auto; 
    gap: 16px; 
    align-items: start; 
    background: rgba(255,255,255,0.02); 
    border-bottom: 1px solid var(--border); 
  }
  
  .card-num { 
    width: 44px; 
    height: 44px; 
    border-radius: 12px; 
    background: var(--surface2); 
    border: 1px solid var(--border); 
    display: flex; 
    align-items: center; 
    justify-content: center; 
    font-family: 'Syne', sans-serif; 
    font-weight: 800; 
    font-size: 15px; 
    color: var(--muted); 
  }
  
  .card-meta { 
    display: flex; 
    flex-direction: column; 
    justify-content: center; 
    min-height: 44px; 
  }
  
  .card-code { 
    font-size: 12px; 
    color: var(--primary); 
    font-weight: 700; 
    letter-spacing: 1px; 
    margin-bottom: 4px; 
  }
  
  .card-title { 
    font-size: 16px; 
    font-weight: 600; 
    line-height: 1.4; 
    color: var(--text); 
  }
  
  .info-btn { 
    width: 40px; 
    height: 40px; 
    border-radius: 10px; 
    background: var(--surface2); 
    border: 1px solid var(--border); 
    color: var(--blue); 
    cursor: pointer; 
    display: flex; 
    align-items: center; 
    justify-content: center; 
    font-size: 18px; 
    font-weight: bold; 
    transition: all 0.2s; 
  }
  
  .info-btn:hover { 
    background: var(--blue); 
    color: #fff; 
  }

  .criterion-row { 
    padding: 20px; 
    border-bottom: 1px solid rgba(255,255,255,0.03); 
    display: flex; 
    flex-direction: column; 
    gap: 12px; 
    transition: all 0.3s; 
  }
  
  .criterion-row:last-child { 
    border-bottom: none; 
  }
  
  .criterion-row.na-active .criterion-text { 
    opacity: 0.4; 
  }
  
  .criterion-row.na-active .criterion-pts { 
    opacity: 0.4; 
    text-decoration: line-through; 
  }
  
  .criterion-text-box { 
    display: flex; 
    justify-content: space-between; 
    align-items: flex-start; 
    gap: 16px; 
  }
  
  .criterion-text { 
    font-size: 14px; 
    line-height: 1.6; 
    color: var(--text); 
    flex: 1; 
    display: flex; 
    gap: 10px; 
  }
  
  .criterion-text::before { 
    content: '◆'; 
    color: var(--amber); 
    font-size: 10px; 
    margin-top: 4px; 
  }
  
  .criterion-pts { 
    background: var(--surface2); 
    color: var(--muted); 
    font-size: 11px; 
    font-weight: 700; 
    padding: 4px 8px; 
    border-radius: 6px; 
    border: 1px solid var(--border); 
    white-space: nowrap; 
  }

  .card-actions { 
    display: flex; 
    gap: 8px; 
    align-items: center; 
    flex-wrap: wrap; 
    margin-left: 24px; 
  }
  
  .btn-action { 
    padding: 10px 18px; 
    border-radius: 10px; 
    font-family: 'DM Sans', sans-serif; 
    font-size: 12px; 
    font-weight: 600; 
    cursor: pointer; 
    border: none; 
    transition: all 0.18s; 
    display: flex; 
    align-items: center; 
    gap: 6px; 
  }
  
  .btn-tespit { background: rgba(255,59,48,0.12); color: var(--red); border: 1px solid rgba(255,59,48,0.25); }
  .btn-tespit:hover, .btn-tespit.active { background: var(--red); color: #fff; border-color: var(--red); box-shadow: 0 4px 16px rgba(255,59,48,0.4); }
  
  .btn-yok { background: rgba(48,209,88,0.1); color: var(--green); border: 1px solid rgba(48,209,88,0.2); }
  .btn-yok:hover, .btn-yok.active { background: var(--green); color: #000; border-color: var(--green); box-shadow: 0 4px 16px rgba(48,209,88,0.35); }
  
  .btn-na { background: rgba(58,58,63,0.3); color: var(--muted); border: 1px solid rgba(255,255,255,0.08); }
  .btn-na:hover, .btn-na.active { background: var(--gray); color: #ccc; border-color: var(--muted); }

  .extras-area { 
    padding: 0 20px 20px 44px; 
    display: flex; 
    flex-direction: column; 
    gap: 12px; 
  }
  
  .image-upload-area { 
    padding: 14px; 
    border-radius: 12px; 
    display: none; 
    border: 1.5px dashed rgba(255,59,48,0.3); 
    background: rgba(255,59,48,0.04); 
  }
  
  .image-upload-area.visible { 
    display: block; 
    animation: fadeIn 0.2s ease; 
  }
  
  .upload-label { 
    display: flex; 
    align-items: center; 
    gap: 10px; 
    cursor: pointer; 
    font-size: 13px; 
    color: rgba(255,59,48,0.7); 
  }
  
  .upload-label input { 
    display: none; 
  }
  
  .uploaded-images { 
    display: flex; 
    flex-wrap: wrap; 
    gap: 8px; 
    margin-top: 10px; 
  }
  
  .uploaded-img-thumb { 
    width: 64px; 
    height: 64px; 
    border-radius: 8px; 
    object-fit: cover; 
    border: 1px solid var(--border); 
    cursor: pointer; 
  }
  
  .note-input { 
    width: 100%; 
    background: var(--surface2); 
    border: 1px solid var(--border); 
    display: none; 
    color: var(--text); 
    border-radius: 10px; 
    padding: 10px 14px; 
    font-family: 'DM Sans', sans-serif; 
    font-size: 13px; 
    resize: vertical; 
    min-height: 60px; 
    outline: none; 
  }
  
  .note-input.visible { 
    display: block; 
    animation: fadeIn 0.2s ease; 
  }

  /* GROUPS & PAGINATION */
  .section-group { 
    margin-bottom: 20px; 
  }
  
  .section-group-title { 
    font-family: 'Syne', sans-serif; 
    font-weight: 800; 
    font-size: 20px; 
    margin-bottom: 20px; 
    display: flex; 
    align-items: center; 
    gap: 12px; 
  }
  
  .section-group-title::after { 
    content: ''; 
    flex: 1; 
    height: 1px; 
    background: var(--border); 
  }
  
  .section-icon { 
    width: 36px; 
    height: 36px; 
    border-radius: 10px; 
    display: flex; 
    align-items: center; 
    justify-content: center; 
    font-size: 16px; 
    background: var(--surface2); 
    border: 1px solid var(--border); 
  }
  
  .pagination-controls { 
    display: flex; 
    justify-content: space-between; 
    align-items: center; 
    margin-top: 32px; 
    padding-top: 24px; 
    border-top: 1px solid var(--border); 
  }
  
  .page-indicator { 
    font-family: 'Syne', sans-serif; 
    font-weight: 700; 
    color: var(--text); 
    font-size: 15px; 
  }
  
  .btn-nav { 
    background: var(--surface2); 
    color: var(--text); 
    border: 1px solid var(--border); 
    padding: 12px 24px; 
    border-radius: 10px; 
    cursor: pointer; 
    font-weight: 600; 
  }
  
  .btn-nav:hover:not(:disabled) { 
    background: var(--gray); 
  }
  
  .btn-finish { 
    background: linear-gradient(135deg, var(--green), #28a745); 
    color: #fff; 
    border: none; 
    box-shadow: 0 4px 15px rgba(48,209,88,0.3); 
  }

  /* FOOTER */
  .site-footer { 
    text-align: center; 
    padding: 20px; 
    border-top: 1px solid var(--border); 
    font-size: 12px; 
    color: var(--muted); 
    background: var(--surface); 
  }
  
  .site-footer a { 
    color: var(--blue); 
    text-decoration: none; 
    font-weight: 600; 
  }

  /* MODALS & Z-INDEX HIERARCHY */
  .modal-overlay { 
    display: none; 
    position: fixed; 
    inset: 0; 
    background: rgba(0,0,0,0.85); 
    align-items: center; 
    justify-content: center; 
    backdrop-filter: blur(10px); 
    animation: fadeIn 0.2s ease; 
  }
  
  .modal-overlay.open { 
    display: flex; 
  }
  
  .modal { 
    background: var(--surface); 
    border: 1px solid var(--border); 
    border-radius: 20px; 
    max-width: 600px; 
    width: 90%; 
    max-height: 85vh; 
    overflow: auto; 
    padding: 32px; 
    position: relative; 
  }
  
  .modal-close { 
    position: absolute; 
    top: 16px; 
    right: 16px; 
    width: 32px; 
    height: 32px; 
    background: var(--surface2); 
    border: 1px solid var(--border); 
    border-radius: 8px; 
    color: var(--muted); 
    cursor: pointer; 
    font-size: 16px; 
    display: flex; 
    align-items: center; 
    justify-content: center; 
    z-index: 10; 
  }
  
  .modal h2 { 
    font-family: 'Syne', sans-serif; 
    font-size: 22px; 
    margin-bottom: 16px; 
    text-align: center; 
  }
  
  .standards-list { 
    list-style: none; 
    padding: 0; 
    margin-top: 10px; 
  }
  
  .standards-list li { 
    padding: 10px 0; 
    border-bottom: 1px solid var(--border); 
    font-size: 13.5px; 
    color: #ccc; 
    line-height: 1.6; 
    display: flex; 
    align-items: flex-start; 
    gap: 10px; 
  }
  
  .standards-list li span.blue-arrow { 
    color: var(--blue); 
    font-weight: bold; 
    font-size: 14px; 
    margin-top: -1px; 
  }

  /* FORMS */
  .form-group { 
    margin-bottom: 16px; 
  }
  
  .form-group label { 
    display: block; 
    font-size: 12px; 
    color: var(--muted); 
    margin-bottom: 6px; 
    font-weight: 600; 
    text-transform: uppercase; 
  }
  
  .form-input { 
    width: 100%; 
    background: var(--surface2); 
    border: 1px solid var(--border); 
    color: var(--text); 
    padding: 12px; 
    border-radius: 10px; 
    outline: none; 
    font-family: 'DM Sans'; 
    font-size: 14px; 
  }
  
  .form-input option { 
    background: var(--surface); 
    color: var(--text); 
  }
  
  .btn-start { 
    width: 100%; 
    padding: 14px; 
    border-radius: 10px; 
    background: var(--primary); 
    color: #fff; 
    font-weight: 700; 
    font-family: 'Syne'; 
    border: none; 
    cursor: pointer; 
    margin-top: 10px; 
    font-size: 16px; 
  }
  
  .btn-start:hover { 
    background: var(--primary-dark); 
  }

  /* REPORT & ADMIN TABLE */
  .report-table { 
    width: 100%; 
    border-collapse: collapse; 
    font-size: 12px; 
    margin-bottom: 24px; 
  }
  
  .report-table th { 
    background: var(--surface2); 
    padding: 10px 14px; 
    text-align: left; 
    font-family: 'Syne', sans-serif; 
    font-size: 11px; 
    text-transform: uppercase; 
    color: var(--muted); 
    border-bottom: 1px solid var(--border); 
  }
  
  .report-table td { 
    padding: 10px 14px; 
    border-bottom: 1px solid var(--border); 
    color: var(--text); 
    vertical-align: middle; 
    line-height: 1.5; 
  }
  
  .badge-s { 
    padding: 4px 8px; 
    border-radius: 6px; 
    font-size: 10px; 
    font-weight: 700; 
    white-space: nowrap; 
  }
  
  .badge-s.t { background: rgba(255,59,48,0.2); color: var(--red); border: 1px solid rgba(255,59,48,0.3); }
  .badge-s.y { background: rgba(48,209,88,0.2); color: var(--green); border: 1px solid rgba(48,209,88,0.3); }
  .badge-s.n { background: rgba(58,58,63,0.3); color: var(--muted); border: 1px solid var(--border); }
  
  .modal-score-box { 
    flex: 1; 
    background: var(--surface2); 
    border: 1px solid var(--border); 
    border-radius: 12px; 
    padding: 12px 16px; 
    text-align: center; 
  }
  
  .modal-score-box .v { 
    font-family: 'Syne', sans-serif; 
    font-size: 24px; 
    font-weight: 800; 
    color: var(--amber); 
  }
  
  .modal-score-box .l { 
    font-size: 11px; 
    color: var(--muted); 
    text-transform: uppercase; 
    margin-top: 2px; 
  }

  .print-btn-large {
    background: linear-gradient(135deg, var(--blue), #0056b3); 
    color: #fff; 
    border: none; 
    padding: 12px 24px; 
    border-radius: 12px;
    font-family: 'Syne', sans-serif; 
    font-weight: 700; 
    font-size: 15px; 
    cursor: pointer; 
    display: inline-flex; 
    align-items: center; 
    gap: 8px;
    box-shadow: 0 4px 15px rgba(10,132,255,0.4); 
    transition: all 0.2s; 
    margin-bottom: 20px;
  }
  
  .print-btn-large:hover { 
    transform: translateY(-2px); 
    box-shadow: 0 6px 20px rgba(10,132,255,0.6); 
  }

  @keyframes fadeIn { 
    from { opacity: 0; transform: translateY(4px); } 
    to { opacity: 1; transform: translateY(0); } 
  }
  
  /* ================== MOBİL UYUM (RESPONSIVE) KODLARI ================== */
  @media (max-width: 768px) {
    .top-bar { 
      height: auto; 
      flex-direction: column; 
      padding: 16px; 
      gap: 16px; 
    }
    .brand { 
      width: 100%; 
      justify-content: center; 
    }
    .score-display { 
      width: 100%; 
      justify-content: center; 
    }
    .header-actions { 
      width: 100%; 
      justify-content: space-between; 
    }
    .audit-code-badge { 
      font-size: 11px; 
      padding: 8px 12px; 
    }
    .progress-container { 
      flex-direction: column; 
      padding: 16px; 
      gap: 12px; 
      align-items: stretch; 
    }
    .progress-stats { 
      flex-wrap: wrap; 
      justify-content: center; 
      gap: 12px; 
    }
    .container { 
      padding: 16px 12px; 
    }
    .card-header { 
      grid-template-columns: 1fr auto; 
    }
    .card-num { 
      margin-bottom: 10px; 
    }
    .criterion-text-box { 
      flex-direction: column; 
      gap: 8px; 
    }
    .criterion-pts { 
      align-self: flex-start; 
    }
    .card-actions { 
      margin-left: 0; 
      display: grid; 
      grid-template-columns: repeat(3, 1fr); 
      gap: 6px; 
    }
    .btn-action { 
      justify-content: center; 
      padding: 10px 4px; 
      font-size: 11px; 
    }
    .extras-area { 
      padding: 0 16px 20px 16px; 
    }
    .pagination-controls { 
      flex-direction: column; 
      gap: 16px; 
      padding-top: 16px; 
    }
    .page-indicator { 
      order: -1; 
      margin-bottom: 4px; 
    }
    .btn-nav { 
      width: 100%; 
      text-align: center; 
      justify-content: center; 
    }
    .modal { 
      padding: 24px 16px; 
    }
    .admin-table-wrapper { 
      overflow-x: auto; 
      -webkit-overflow-scrolling: touch; 
      width: 100%; 
    }
    .report-table { 
      min-width: 550px; 
    }
  }

  /* ================== KESİN ÇÖZÜM - PRINT (YAZDIRMA) MOTORU ================== */
  @media print {
    @page { 
      margin: 10mm; 
    }
    html, body { 
      display: block !important; 
      position: static !important; 
      background: #fff !important; 
      color: #000 !important; 
      height: auto !important; 
      min-height: 100% !important; 
      overflow: visible !important; 
      margin: 0 !important; 
      padding: 0 !important; 
    }
    body > div:not(#reportModal) { 
      display: none !important; 
    }
    header, footer, nav, aside, .progress-container { 
      display: none !important; 
    }
    #reportModal { 
      display: block !important; 
      position: static !important; 
      background: #fff !important; 
      padding: 0 !important; 
      margin: 0 !important; 
      overflow: visible !important; 
      height: auto !important; 
      min-height: auto !important; 
    }
    #reportModalContent { 
      display: block !important; 
      position: static !important; 
      width: 100% !important; 
      max-width: 100% !important; 
      border: none !important; 
      box-shadow: none !important; 
      margin: 0 !important; 
      padding: 0 !important; 
      height: auto !important; 
      max-height: none !important; 
      overflow: visible !important; 
      transform: none !important; 
    }
    .print-hide, .modal-close { 
      display: none !important; 
    }
    .report-table { 
      page-break-inside: auto !important; 
      width: 100% !important; 
      border-collapse: collapse !important; 
      margin-bottom: 20px !important; 
    }
    .report-table tr { 
      page-break-inside: avoid !important; 
      page-break-after: auto !important; 
    }
    .report-table th { 
      background: #f0f0f0 !important; 
      color: #000 !important; 
      border-bottom: 2px solid #ccc !important; 
      -webkit-print-color-adjust: exact !important; 
      print-color-adjust: exact !important; 
    }
    .report-table td { 
      border-bottom: 1px solid #e0e0e0 !important; 
      color: #000 !important; 
      page-break-inside: avoid !important; 
    }
    .print-chapter-title { 
      color: #000 !important;
